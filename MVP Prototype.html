    } : i);
    s.screen = s.fromScreen === 'items' ? 'items' : 'wishlist-detail';
    if (s.fromWid) s.currentWid = s.fromWid;
    render();
    showToast('Archived.');
  }

  // ─── Wishlist picker (form) ───────────────
  function setFormWl(wid) {
    s.addForm.wid = wid;
    s.addForm.showNewWl = false;
    render(); scalePhone();
  }
  function openNewWlInput() {
    s.addForm.showNewWl = true;
    render(); scalePhone();
    setTimeout(() => document.getElementById('wl-new-wl-input')?.focus(), 60);
  }
  function createFormWl() {
    const el = document.getElementById('wl-new-wl-input');
    const name = el?.value.trim();
    s.addForm.showNewWl = false;
    if (name) {
      const newWl = { id: 'w' + genId(), name };
      wishlists.push(newWl);
      s.addForm.wid = newWl.id;
    }
    render(); scalePhone();
  }
  function createFormWlBlur() {
    // Small delay so click on a pill isn't swallowed
    setTimeout(() => {
      if (s.addForm.showNewWl) createFormWl();
    }, 150);
  }

  // ─── Move unorganized item to wishlist ────
  function openMoveToWishlist(id) {
    s.currentIid = id;
    s.overlay = 'move-wl';
    render();
  }
  function moveItemToWl(itemId, wid) {
    items = items.map(i => i.id === itemId ? { ...i, wid } : i);
    s.overlay = null;
    render();
    showToast('Added to wishlist.');
  }

  function openDeleteOverlay(id) {
    s.currentIid = id;
    s.overlay = 'delete';
    render();
  }

  function confirmDelete() {
    const id = s.currentIid;
    items = items.filter(i => i.id !== id);
    s.overlay = null;
    s.screen = s.fromScreen === 'items' ? 'items'
      : s.fromScreen === 'archive' ? 'archive'
      : 'wishlist-detail';
    if (s.fromWid) s.currentWid = s.fromWid;
    render();
    showToast('Deleted.');
  }

  function deleteItem(id) {
    // from archive — open confirm
    s.currentIid = id;
    s.fromScreen = 'archive';
    s.overlay = 'delete';
    render();
  }

  function restoreItem(id) {
    items = items.map(i => i.id === id ? {
      ...i, status:'watching', reason:null, archivedAt:undefined,
    } : i);
    render();
    showToast('Restored to wishlist.');
  }

  // ═══════════════════════════════════════════
  // WISHLIST EDIT MODE
  // ═══════════════════════════════════════════

  function toggleWlEdit() {
    s.wlEditMode = !s.wlEditMode;
    render(); scalePhone();
  }

  function itemListRow(item, idx=0) {
    const d = days(item.addedAt);
    const purchased = item.status === 'purchased';
    const thumbH = item.img
      ? `<img src="${item.img}" alt="${esc(item.name)}" loading="lazy" />`
      : `<div class="ph">${esc(item.name)}</div>`;
    const dragAttrs = s.wlItemEditMode
      ? `draggable="true"
         ondragstart="itemDragStart(event,${idx})"
         ondragover="itemDragOver(event,${idx})"
         ondragleave="itemDragLeave(event)"
         ondrop="itemDrop(event,${idx})"
         ondragend="itemDragEnd(event)"` : '';
    const clickAttr = s.wlItemEditMode || purchased ? '' : `onclick="openItem('${item.id}')"`;
    return `
      <div class="list-row ${purchased ? 'list-row-purchased' : ''}" ${clickAttr} ${dragAttrs}>
        ${s.wlItemEditMode ? `<span class="list-drag-handle">⠿</span>` : ''}
        <div class="list-thumb">${thumbH}</div>
        <div class="list-info">
          <p class="list-name">${esc(item.name)}</p>
          <p class="list-meta">${pad(d)} · ${purchased ? 'Purchased' : item.serious ? 'Serious' : 'Watching'}</p>
          ${item.price && savedAmount(item) && !purchased ? `<div class="mini-progress"><div class="mini-progress-fill" style="width:${progressPct(item)}%"></div></div>` : ''}
        </div>
        ${item.price ? `<span class="list-price">${money(item.price)}</span>` : ''}
        ${s.wlItemEditMode
          ? `<div class="list-delete-btn" onclick="removeItem(event,'${item.id}')">×</div>`
          : ''}
      </div>`;
  }

  function archiveRow(item) {
    const d = days(item.addedAt);
    const reason = item.reason === 'got_it' ? 'Purchased' : 'Archived';
    const thumbH = item.img
      ? `<img src="${item.img}" alt="${esc(item.name)}" loading="lazy" />`
      : `<div class="ph">${esc(item.name)}</div>`;
    return `
      <div class="archive-row">
        <div class="archive-thumb">${thumbH}</div>
        <div class="archive-info">
          <p class="archive-reason">${reason}</p>
          <p class="archive-name">${esc(item.name)}</p>
          <p class="archive-meta">Watched ${d} days</p>
        </div>
        <div class="archive-btns">
          <button class="archive-btn" onclick="restoreItem('${item.id}')">Restore</button>
          <button class="archive-btn ghost" onclick="deleteItem('${item.id}')">Delete</button>
        </div>
      </div>`;
  }

  function archiveGridCard(item) {
    const d = days(item.addedAt);
    const reason = item.reason === 'got_it' ? 'Purchased' : 'Archived';
    const imgH = item.img
      ? `<img src="${item.img}" alt="${esc(item.name)}" loading="lazy" />`
      : `<div class="ph">${esc(item.name)}</div>`;
    return `
      <div class="card card-purchased" style="position:relative">
        <div class="card-image">${imgH}</div>
        <div class="card-meta">
          <div class="card-prefix"><span class="card-days">${reason}</span></div>
          <p class="card-name">${esc(item.name)}</p>
          <p class="card-price">Watched ${d} days</p>
          <div style="display:flex;gap:6px;margin-top:8px">
            <button class="archive-btn" style="flex:1" onclick="restoreItem('${item.id}')">Restore</button>
            <button class="archive-btn ghost" style="flex:1" onclick="deleteItem('${item.id}')">Delete</button>
          </div>
        </div>
      </div>`;
  }

  function setWlView(mode) {
    s.wlViewMode = mode;
    render(); scalePhone();
  }

  function toggleItemsFilter(tag) {
    const idx = s.itemsFilterTags.indexOf(tag);
    if (idx === -1) s.itemsFilterTags = [...s.itemsFilterTags, tag];
    else s.itemsFilterTags = s.itemsFilterTags.filter(t => t !== tag);
    render(); scalePhone();
  }

  async function shareWishlist(wid) {
    const wl = getWl(wid);
    if (!wl) return;
    const wItems = watchingItems(wid);
    const itemLines = wItems.length
      ? wItems.map(i => `• ${i.name}${i.price ? '  ' + money(i.price) : ''}`).join('\n')
      : 'No items yet.';
    const shareText = `${wl.name.toUpperCase()}\n\n${itemLines}`;
    if (navigator.share) {
      try {
        await navigator.share({ title: wl.name, text: shareText });
      } catch (e) {
        if (e.name !== 'AbortError') showToast('Could not share.');
      }
    } else {
      try {
        await navigator.clipboard.writeText(shareText);
        showToast('Copied to clipboard.');
      } catch {
        showToast('Sharing not available.');
      }
    }
  }

  function setItemsView(mode) {
    s.itemsViewMode = mode;
    render(); scalePhone();
  }

  function setArchiveView(mode) {
    s.archiveViewMode = mode;
    render(); scalePhone();
  }

  function openAddWishlistItem(wid) {
    openAddItem(wid);
  }

  // Item drag-to-reorder
  function itemDragStart(e, idx) {
    itemDragSrcIdx = idx;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', String(idx));
    setTimeout(() => { if (e.target) e.target.style.opacity = '0.35'; }, 0);
  }
  function itemDragOver(e, idx) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.style.outline = '2px solid #000';
    e.currentTarget.style.outlineOffset = '-2px';
  }
  function itemDragLeave(e) {
    e.currentTarget.style.outline = '';
  }
  function itemDrop(e, toIdx) {
    e.preventDefault(); e.stopPropagation();
    e.currentTarget.style.outline = '';
    const fromIdx = itemDragSrcIdx;
    if (fromIdx === null || fromIdx === toIdx) { itemDragSrcIdx = null; return; }
    const wid = s.currentWid;
    const wlList = wishlistItems(wid);
    const moved = wlList.splice(fromIdx, 1)[0];
    wlList.splice(toIdx, 0, moved);
    // Assign explicit order values preserving new sequence
    const base = Date.now();
    wlList.forEach((itm, i) => {
      items = items.map(x => x.id === itm.id ? { ...x, order: base - i * 1000 } : x);
    });
    itemDragSrcIdx = null;
    render(); scalePhone();
  }
  function itemDragEnd(e) {
    e.target.style.opacity = '';
    itemDragSrcIdx = null;
  }

  function addManually() {
    s.addForm.url  = '';
    s.addForm.name = '';
    s.addForm.brand = '';
    s.addForm.tags = [];
    s.addForm.showTagInput = false;
    s.addForm.tagQuery = '';
    s.addForm.img  = '';
    s.addForm.price = '';
    s.addForm.saved = '';
    s.addForm.note  = '';
    s.addForm.wid   = s.addWid || wishlists[0]?.id || '';
    s.addForm.serious = false;
    s.addStep = 'form';
    render(); scalePhone();
  }

  function handleItemFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      s.addForm.img = e.target.result;
      render(); scalePhone();
    };
    reader.readAsDataURL(file);
  }

  function handleCoverFile(input, wid) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      wishlists = wishlists.map(w => w.id === wid ? { ...w, coverImg: e.target.result } : w);
      s.overlay = null;
      render(); scalePhone();
      showToast('Cover updated.');
    };
    reader.readAsDataURL(file);
  }

  function toggleWlItemEdit() {
    s.wlItemEditMode = !s.wlItemEditMode;
    render(); scalePhone();
    if (s.wlItemEditMode) {
      setTimeout(() => document.getElementById('wl-rename-input')?.select(), 80);
    }
  }

  function renameWishlist(wid, newName) {
    const name = newName.trim();
    if (!name) return;
    wishlists = wishlists.map(w => w.id === wid ? { ...w, name } : w);
    // Update the display label without full re-render (preserves focus flow)
    const big = document.querySelector('.wl-name-big');
    if (big) big.textContent = name.toUpperCase();
  }

  function removeItem(e, id) {
    e.stopPropagation();
    items = items.filter(i => i.id !== id);
    render(); scalePhone();
    showToast('Item removed.');
  }

  function openChangeCover(wid) {
    s.currentWid = wid;
    s.overlay = 'change-cover';
    render(); scalePhone();
  }

  function closeCoverPanel() {
    s.overlay = null;
    render(); scalePhone();
  }

  function saveCoverImage(wid) {
    const val = document.getElementById('cover-url-input')?.value.trim();
    if (!val) return;
    wishlists = wishlists.map(w => w.id === wid ? { ...w, coverImg: val } : w);
    s.overlay = null;
    render(); scalePhone();
    showToast('Cover updated.');
  }

  function wlLongPressStart() {
    longPressTimer = setTimeout(() => {
      if (!s.wlEditMode) { s.wlEditMode = true; render(); scalePhone(); }
    }, 550);
  }

  function itemLongPressStart(e, id) {
    longPressTimer = setTimeout(() => {
      if (!s.wlItemEditMode) {
        s.wlItemEditMode = true;
        render(); scalePhone();
        showToast('Hold and drag to reorder.');
      }
    }, 500);
  }

  function itemLongPressCancel() {
    clearTimeout(longPressTimer);
  }

  function wlLongPressCancel() {
    clearTimeout(longPressTimer);
  }

  function deleteWishlist(id) {
    const wl = getWl(id);
    const count = watchingItems(id).length;
    if (count > 0) {
      // Remove items too
      items = items.filter(i => i.wid !== id);
    }
    wishlists = wishlists.filter(w => w.id !== id);
    if (wishlists.length === 0) s.wlEditMode = false;
    render(); scalePhone();
    showToast(wl ? `"${wl.name}" removed.` : 'Wishlist removed.');
  }

  // ── Drag & drop to reorder ──
  function wlDragStart(e, idx) {
    dragSrcIdx = idx;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', String(idx));
    setTimeout(() => { if (e.target) e.target.style.opacity = '0.35'; }, 0);
  }

  function wlDragOver(e, idx) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.classList.add('card-drag-over');
  }

  function wlDragLeave(e) {
    e.currentTarget.classList.remove('card-drag-over');
  }

  function wlDrop(e, idx) {
    e.preventDefault();
    e.stopPropagation();
    e.currentTarget.classList.remove('card-drag-over');
    if (dragSrcIdx === null || dragSrcIdx === idx) { dragSrcIdx = null; return; }
    const moved = wishlists.splice(dragSrcIdx, 1)[0];
    wishlists.splice(idx, 0, moved);
    dragSrcIdx = null;
    render(); scalePhone();
  }

  function wlDragEnd(e) {
    e.target.style.opacity = '';
    document.querySelectorAll('.card-drag-over').forEach(el => el.classList.remove('card-drag-over'));
    dragSrcIdx = null;
  }

  // ═══════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════

  function scalePhone() {
    const phone = document.getElementById('phone');
    if (!phone) return;
    const availW = window.innerWidth - 48;
    const availH = window.innerHeight - 120;
    const scale = Math.min(1, availW / 390, availH / 844);
    phone.style.transform = `scale(${scale})`;
    // Collapse the whitespace left by transform shrinking the element
    phone.style.marginBottom = `${(844 * scale) - 844}px`;
  }
  window.addEventListener('resize', scalePhone);

  // ─── Swipe back gesture ───────────────────
  let swipeTouchId = null, swipeStartX = 0, swipeStartY = 0;

  function handleSwipeBack() {
    if (s.screen === 'wishlist-detail') {
      navTo('wishlists');
    } else if (s.screen === 'item-detail') {
      if (s.fromScreen === 'wishlist-detail' && s.fromWid) {
        openWl(s.fromWid);
      } else {
        navTo(s.fromScreen || 'wishlists');
      }
    }
  }

  document.getElementById('phone').addEventListener('touchstart', e => {
    const t = e.touches[0];
    // Only intercept touches starting from the left 20% of the phone element
    const rect = document.getElementById('phone').getBoundingClientRect();
    if (t.clientX - rect.left < rect.width * 0.2) {
      swipeTouchId = t.identifier;
      swipeStartX = t.clientX;
      swipeStartY = t.clientY;
    }
  }, { passive: true });

  document.getElementById('phone').addEventListener('touchend', e => {
    const t = [...e.changedTouches].find(x => x.identifier === swipeTouchId);
    if (!t) return;
    swipeTouchId = null;
    const dx = t.clientX - swipeStartX;
    const dy = Math.abs(t.clientY - swipeStartY);
    if (dx > 70 && dy < 60) handleSwipeBack();
  }, { passive: true });

  render();
  scalePhone();

  // ─── Web Share Target handler ─────────────
  // When the app is opened via "Share → The Wishlist" from a browser,
  // the OS appends ?url=<product-url> (per manifest share_target config).
  // Detect it and jump straight into the fetch flow.
  (function handleShareTarget() {
    const p = new URLSearchParams(window.location.search);
    let sharedUrl = p.get('url') || '';
    // Some apps share as plain text — try to extract a URL from it
    if (!sharedUrl) {
      const text = p.get('text') || '';
      const match = text.match(/https?:\/\/\S+/);
      if (match) sharedUrl = match[0];
    }
    if (!sharedUrl) return;
    try { new URL(sharedUrl); } catch { return; } // ignore non-URLs
    // Set up state to add item from this URL
    s.screen = 'add-item';
    s.addStep = 'url';
    s.addForm = {
      ...s.addForm,
      url: sharedUrl,
      name: p.get('title') || '',
    };
    // fetchUrl reads s.addForm.url when the input field isn't in the DOM yet
    fetchUrl();
  })();
  </script>
</body>
</html>
