  async function removeItemBackground() {
    const src = s.addForm.img;
    if (!src || s.removingBg) return;

    s.removingBg = true;
    render();
    // Yield so the browser paints "Removing..." before the heavy canvas work
    await new Promise(r => setTimeout(r, 0));

    try {
      // For external URLs we need pixel access — try several strategies in order
      let imgEl = null; // set if we got a usable Image element
      let imgSrc = src; // set if we got a data URL

      if (!src.startsWith('data:')) {
        const toDataUrl = blob => new Promise(resolve => {
          const reader = new FileReader();
          reader.onload = e => resolve(e.target.result);
          reader.readAsDataURL(blob);
        });
        const fetchTimeout = (url, ms) => {
          const ctrl = new AbortController();
          const t = setTimeout(() => ctrl.abort(), ms);
          return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(t));
        };

        // 1. Load with crossOrigin=anonymous — works if CDN sends CORS headers
        const directImg = await new Promise(resolve => {
          const i = new Image();
          i.crossOrigin = 'anonymous';
          i.onload = () => resolve(i);
          i.onerror = () => resolve(null);
          setTimeout(() => resolve(null), 6000);
          i.src = src;
        });
        if (directImg) {
          // Test canvas access — throws SecurityError if server didn't send CORS headers
          try {
            const tc = document.createElement('canvas');
            tc.width = 1; tc.height = 1;
            tc.getContext('2d').drawImage(directImg, 0, 0);
            tc.getContext('2d').getImageData(0, 0, 1, 1);
            imgEl = directImg; // success — use this image element directly
          } catch {}
        }

        // 2. Proxy fetches (race allorigins vs corsproxy, 10s timeout each)
        if (!imgEl) {
          const enc = encodeURIComponent(src);
          const tryProxy = async url => {
            const res = await fetchTimeout(url, 10000);
            if (!res.ok) throw new Error('bad');
            return toDataUrl(await res.blob());
          };
          try {
            imgSrc = await Promise.any([
              tryProxy(`https://api.allorigins.win/raw?url=${enc}`),
              tryProxy(`https://corsproxy.io/?${enc}`),
            ]);
          } catch {
            s.removingBg = false;
            render();
            showToast('Upload the image first, then remove the background.');
            return;
          }
        }
      }

      // Draw image to canvas
      const img = imgEl || await new Promise((resolve, reject) => {
        const i = new Image();
        i.onload = () => resolve(i);
        i.onerror = reject;
        i.src = imgSrc;
      });

      const W = img.naturalWidth, H = img.naturalHeight;
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      const imageData = ctx.getImageData(0, 0, W, H);
      const d = imageData.data;

      // Sample corners + edge midpoints to estimate background color robustly
      function px(x, y) { const i = (y*W+x)*4; return [d[i], d[i+1], d[i+2]]; }
      const samples = [
        px(0,0), px(W-1,0), px(0,H-1), px(W-1,H-1),
        px(Math.floor(W/2),0), px(Math.floor(W/2),H-1),
        px(0,Math.floor(H/2)), px(W-1,Math.floor(H/2)),
      ];
      const bg = samples.reduce((a,c) => [a[0]+c[0],a[1]+c[1],a[2]+c[2]], [0,0,0])
                        .map(v => Math.round(v/samples.length));

      // Two-zone threshold: hard remove (pure bg) + soft fade (shadows/gradients)
      const HARD = 30;   // fully transparent
      const SOFT = 90;   // BFS still propagates but alpha is blended

      function dist(i) {
        const dr=d[i]-bg[0], dg=d[i+1]-bg[1], db=d[i+2]-bg[2];
        return Math.sqrt(dr*dr+dg*dg+db*db);
      }

      const visited = new Uint8Array(W*H);
      const queue = new Int32Array(W*H*2);
      let head=0, tail=0;

      function enq(x,y) {
        const idx=y*W+x;
        if (!visited[idx]) { visited[idx]=1; queue[tail++]=x; queue[tail++]=y; }
      }
      for (let x=0; x<W; x++) { enq(x,0); enq(x,H-1); }
      for (let y=1; y<H-1; y++) { enq(0,y); enq(W-1,y); }

      while (head < tail) {
        const x=queue[head++], y=queue[head++];
        const pi=(y*W+x)*4;
        const dd=dist(pi);
        if (dd <= SOFT) {
          if (dd <= HARD) {
            // Pure background — fully transparent
            d[pi+3] = 0;
          } else {
            // Shadow/gradient zone — blend alpha proportionally
            const t = (dd - HARD) / (SOFT - HARD); // 0 = bg edge, 1 = product edge
            d[pi+3] = Math.round(d[pi+3] * t * t); // quadratic fade, bias toward transparent
          }
          // Continue BFS into neighbours
          if (x>0)   enq(x-1,y);
          if (x<W-1) enq(x+1,y);
          if (y>0)   enq(x,y-1);
          if (y<H-1) enq(x,y+1);
        }
      }

      ctx.putImageData(imageData, 0, 0);
      s.addForm.img = canvas.toDataURL('image/png');
      s.removingBg = false;
      render();
    } catch(err) {
      console.error('[Remove BG]', err);
      s.removingBg = false;
      render();
      showToast('Could not remove background.');
    }
  }

  function onTagQuery(val) {
    s.addForm.tagQuery = val;
    const el = document.getElementById('tag-suggestions');
    const input = document.getElementById('tag-inline-input');
    if (!el || !input) return;
    const selected = s.addForm.tags || [];
    const q = val.toLowerCase();
    const matches = availableTags.filter(t =>
      !selected.includes(t) && (!q || t.toLowerCase().includes(q))
    );
    [...el.querySelectorAll('.tag-suggestion')].forEach(b => b.remove());
    matches.reverse().forEach(t => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'tag-suggestion';
      btn.textContent = t;
      btn.onclick = () => addTag(t);
      el.prepend(btn);
    });
  }

  function addTag(tag) {
    syncFormFields();
    const normalized = tag.trim();
    if (!normalized) return;
    const title = normalized.charAt(0).toUpperCase() + normalized.slice(1);
    if (!availableTags.includes(title)) availableTags = [...availableTags, title];
    if (!(s.addForm.tags || []).includes(title)) {
      s.addForm.tags = [...(s.addForm.tags || []), title];
    }
    s.addForm.showTagInput = false;
    s.addForm.tagQuery = '';
    render();
  }

  function currencyKeydown(e, fieldId) {
    const passthrough = ['Tab','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Enter','Escape'];
    if (passthrough.includes(e.key)) return;
    e.preventDefault();
    const field = e.target;
    let cents = parseInt(field.dataset.cents || '0', 10);
    if (e.key >= '0' && e.key <= '9') {
      cents = Math.min(cents * 10 + parseInt(e.key, 10), 9999999);
    } else if (e.key === 'Backspace') {
      cents = Math.floor(cents / 10);
    } else {
      return;
    }
    field.dataset.cents = cents;
    field.value = (cents / 100).toFixed(2);
  }

  // Upload a data URL image to an anonymous host, return the HTTP URL or null
  async function uploadDataUrl(dataUrl) {
    if (!dataUrl || !dataUrl.startsWith('data:')) return null;
    try {
      const res = await fetch(dataUrl);
      const blob = await res.blob();
      const ext = blob.type.includes('png') ? 'png' : blob.type.includes('webp') ? 'webp' : 'jpg';
      // Primary: catbox.moe anonymous upload
      const form = new FormData();
      form.append('reqtype', 'fileupload');
      form.append('fileToUpload', blob, `img.${ext}`);
      const r = await fetch('https://catbox.moe/user/api.php', { method: 'POST', body: form });
      const url = (await r.text()).trim();
      if (url.startsWith('https://')) return url;
    } catch {}
    try {
      // Fallback: 0x0.st
      const res = await fetch(dataUrl);
      const blob = await res.blob();
      const form = new FormData();
      form.append('file', blob, 'img.jpg');
      const r = await fetch('https://0x0.st', { method: 'POST', body: form });
      const url = (await r.text()).trim();
      if (url.startsWith('http')) return url;
    } catch {}
    return null;
  }

  async function shareWishlist(wid) {
    const wl = getWl(wid);
    if (!wl) return;
    const wItems = watchingItems(wid);

    // Resolve any data URL images to hosted HTTP URLs so they render for recipients
    const resolveImg = async (img) => {
      if (!img) return '';
      if (img.startsWith('http')) return img;
      if (img.startsWith('data:')) {
        const hosted = await uploadDataUrl(img);
        if (hosted) {
          // Persist the hosted URL back so future shares are instant
          return hosted;
        }
      }
      return '';
    };

    const hasDataUrls = wl.coverImg?.startsWith('data:') || wItems.some(i => i.img?.startsWith('data:'));
    if (hasDataUrls) showToast('Preparing images…');

    const [coverImgResolved, ...itemImgsResolved] = await Promise.all([
      resolveImg(wl.coverImg),
      ...wItems.map(i => resolveImg(i.img))
    ]);

    // Persist hosted URLs back to items so future shares don't re-upload
    let changed = false;
    wItems.forEach((item, idx) => {
      const hosted = itemImgsResolved[idx];
      if (hosted && hosted.startsWith('http') && item.img !== hosted) {
        items = items.map(x => x.id === item.id ? { ...x, img: hosted } : x);
        changed = true;
      }
    });
    if (coverImgResolved?.startsWith('http') && wl.coverImg !== coverImgResolved) {
      wishlists = wishlists.map(w => w.id === wl.id ? { ...w, coverImg: coverImgResolved } : w);
      changed = true;
    }
    if (changed) saveData();

    const payload = {
      v: 1,
      senderName: getUserName(),
      wl: { name: wl.name, coverImg: coverImgResolved },
      items: wItems.map((i, idx) => ({
        name: i.name,
        brand: i.brand || '',
        img: itemImgsResolved[idx],
        price: i.price || '',
        url: i.url || '',
        tags: i.tags || [],
        note: i.note || '',
        addedAt: i.addedAt
      }))
    };

    const encoded = await encodeShare(payload);
    const shareUrl = location.href.split('#')[0] + '#share=' + encoded;
    const senderName = getUserName();
    const shareTitle = senderName ? `${senderName}'s Wishlist` : wl.name;

    if (navigator.share) {
      try {
        await navigator.share({
          title: shareTitle,
          text: `${shareTitle} — check it out`,
          url: shareUrl,
        });
        if (typeof gtag === 'function') gtag('event', 'share_wishlist', { method: 'native_share', item_count: wItems.length });
      } catch (e) {
        if (e.name !== 'AbortError') showToast('Could not share.');
      }
    } else {
      try {
        await navigator.clipboard.writeText(shareUrl);
        showToast('Link copied.');
        if (typeof gtag === 'function') gtag('event', 'share_wishlist', { method: 'clipboard', item_count: wItems.length });
      } catch {
        showToast('Could not copy link.');
      }
    }
  }

  loadData();

  // ─── Async init: decode shared URL (may require decompression), then render ──
  (async () => {
    const hash = location.hash;

    // ─── Force install sheet (#install) ────────────────────────────
    // When someone taps "Get the App" from a shared wishlist, they land here
    // with #install and we show the onboarding sheet regardless of dismissed state.
    if (hash === '#install') {
      history.replaceState(null, '', location.pathname + location.search);
      render();
      showOnboarding();
      return;
    }

    // ─── Bookmarklet pre-fill (#bm=base64JSON) ─────────────────────
    // When the bookmarklet runs on a product page, it encodes name/img/price/brand
    // and opens the app here — we skip the URL fetch entirely and pre-fill the form.
    if (hash.startsWith('#bm=')) {
      try {
        const bm = JSON.parse(decodeURIComponent(escape(atob(hash.slice(4)))));
        history.replaceState(null, '', location.pathname + location.search);
        s.screen = 'add-item';
        s.addStep = 'form';
        s.addIsEdit = false;
        s.addForm = {
          url: bm.url || '', name: bm.name || '', brand: bm.brand || '',
          tags: [], img: bm.img || '', price: bm.price || '',
          saved: '', note: '', wid: wishlists[0]?.id || '',
          serious: false, showImgEdit: false, showTagInput: false,
          tagQuery: '', showNewWl: false,
        };
      } catch {}
      render();
      return;
    }

    if (hash.startsWith('#share=')) {
      const decoded = await decodeShare(hash.slice(7));
      if (decoded?.wl && Array.isArray(decoded.items)) {
        shareData = decoded;
        s.screen = 'shared-wl';
      }
    }

    // ─── Onboarding ────────────────────────────────────────────────
    // Show install prompt when opened in Safari (not yet installed as PWA),
    // unless the user already dismissed it or is viewing a shared wishlist.
    const isInstalled = window.navigator.standalone === true
      || window.matchMedia('(display-mode: standalone)').matches;
    const obDismissed = (() => { try { return !!localStorage.getItem('vtr_ob_dismissed'); } catch(e) { return false; } })();

    // ─── Analytics: install tracking ───────────────────────────────
    // Android/Chrome: fires when user taps "Add to Home Screen"
    window.addEventListener('appinstalled', () => {
      if (typeof gtag === 'function') gtag('event', 'pwa_install', { method: 'android' });
    });
    // iOS: no appinstalled event — detect first standalone launch instead
    if (isInstalled) {
      const firstStandalone = !localStorage.getItem('vtr_standalone_seen');
      if (firstStandalone) {
        localStorage.setItem('vtr_standalone_seen', '1');
        if (typeof gtag === 'function') gtag('event', 'pwa_install', { method: 'ios_standalone' });
      }
    }

    if (shareData) {
      // Viewing a shared wishlist — skip onboarding and name prompt
      render();
    } else if (!isInstalled && !obDismissed) {
      // Not installed yet — show install instructions first
      showOnboarding();
    } else if (!getUserName()) {
      // Installed (or browser user) but no name set yet — prompt for name
      showNamePrompt();
    } else {
      render();
    }

    // ─── Register service worker — auto-reload when a new version activates
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
      // When a new SW takes control (skipWaiting fired), reload to get fresh code
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    }
  })();

  // ─── Swipe back gesture (left-edge → right) with live drag ──────
  (function initSwipeBack() {
    const EDGE = 30;   // px from left edge to begin tracking
    const MIN_X = 72;  // px horizontal travel to trigger
    let startX = 0, startY = 0, tracking = false, dragging = false;

    const SWIPEABLE = new Set(['wishlist-detail','item-detail','shared-item','add-item','add-wishlist']);

    function swipeBack() {
      switch (s.screen) {
        case 'wishlist-detail':
          navTo('wishlists');
          break;
        case 'item-detail': {
          const item = getItem(s.currentIid);
          if (s.fromScreen === 'items') navTo('items');
          else if (s.fromScreen === 'archive') navTo('archive');
          else if (s.fromScreen === 'wishlists') navTo('wishlists');
          else if (item?.wid) openWl(item.wid);
          else navTo('wishlists');
          break;
        }
        case 'shared-item':
          s.screen = 'shared-wl'; render();
          break;
        case 'add-item':
        case 'add-wishlist':
          cancelAdd();
          break;
      }
    }

    function getPageEl() { return document.getElementById('app'); }

    function applyDrag(dx) {
      const el = getPageEl();
      if (!el) return;
      const clamped = Math.max(0, dx);
      el.style.transform = `translateX(${clamped}px)`;
      el.style.transition = 'none';
      el.style.boxShadow = `-8px 0 24px rgba(0,0,0,${0.08 * Math.min(clamped / 200, 1)})`;
    }

    function resetDrag(commit) {
      const el = getPageEl();
      if (!el) return;
      if (commit) {
        el.style.transition = 'transform 0.22s ease-out';
        el.style.transform = `translateX(${window.innerWidth}px)`;
        setTimeout(() => {
          el.style.transform = '';
          el.style.transition = '';
          el.style.boxShadow = '';
          swipeBack();
        }, 220);
      } else {
        el.style.transition = 'transform 0.2s ease-out';
        el.style.transform = 'translateX(0)';
        el.style.boxShadow = '';
        setTimeout(() => {
          el.style.transition = '';
        }, 200);
      }
    }

    const el = document.getElementById('app');
    el.addEventListener('touchstart', e => {
      if (!SWIPEABLE.has(s.screen)) return;
      const t = e.touches[0];
      if (t.clientX <= EDGE) {
        startX = t.clientX; startY = t.clientY; tracking = true; dragging = false;
      } else { tracking = false; }
    }, { passive: true });

    el.addEventListener('touchmove', e => {
      if (!tracking) return;
      const t = e.touches[0];
      const dx = t.clientX - startX;
      const dy = Math.abs(t.clientY - startY);
      if (!dragging) {
        // Confirm horizontal intent before starting drag
        if (dx > 8 && dy < dx * 0.65) { dragging = true; }
        else if (dy > 10) { tracking = false; return; }
      }
      if (dragging) applyDrag(dx);
    }, { passive: true });

    el.addEventListener('touchend', e => {
      if (!tracking) return;
      tracking = false;
      const t = e.changedTouches[0];
      const dx = t.clientX - startX;
      const dy = Math.abs(t.clientY - startY);
      if (dragging) {
        dragging = false;
        resetDrag(dx >= MIN_X && dy < dx * 0.65);
      }
    }, { passive: true });

    el.addEventListener('touchcancel', () => {
      if (!tracking) return;
      tracking = false;
      if (dragging) { dragging = false; resetDrag(false); }
    }, { passive: true });
  })();

  // ─── Sub-tab horizontal swipe (Wishlists ↔ Items ↔ Archive) ─────
  // Detects a horizontal drag anywhere on the main app when in the wishlists tab
  // and switches between sub-tabs with a smooth slide animation.
  (function initSubTabSwipe() {
    const SUB_TABS = ['wishlists', 'items', 'archive'];
    const MIN_X = 48;   // minimum horizontal travel to trigger
    let startX = 0, startY = 0, tracking = false, dragging = false;

    function isSubTabScreen() {
      return SUB_TABS.includes(s.screen);
    }

    document.getElementById('app').addEventListener('touchstart', e => {
      if (!isSubTabScreen()) return;
      // Don't interfere with the swipe-back gesture (left edge)
      const t = e.touches[0];
      if (t.clientX <= 30) return;
      startX = t.clientX; startY = t.clientY; tracking = true; dragging = false;
    }, { passive: true });

    document.getElementById('app').addEventListener('touchmove', e => {
      if (!tracking || !isSubTabScreen()) return;
      const t = e.touches[0];
      const dx = t.clientX - startX;
      const dy = Math.abs(t.clientY - startY);
      if (!dragging) {
        if (Math.abs(dx) > 8 && dy < Math.abs(dx) * 0.6) { dragging = true; }
        else if (dy > 10) { tracking = false; return; }
      }
    }, { passive: true });

    document.getElementById('app').addEventListener('touchend', e => {
      if (!tracking || !isSubTabScreen()) return;
      tracking = false;
      if (!dragging) return;
      dragging = false;
      const t = e.changedTouches[0];
      const dx = t.clientX - startX;
      const dy = Math.abs(t.clientY - startY);
      if (Math.abs(dx) < MIN_X || dy > Math.abs(dx) * 0.6) return;
      const cur = SUB_TABS.indexOf(s.screen);
      if (dx < 0 && cur < SUB_TABS.length - 1) {
        setWlSubTab(SUB_TABS[cur + 1]);  // swipe left → next tab
      } else if (dx > 0 && cur > 0) {
        setWlSubTab(SUB_TABS[cur - 1]);  // swipe right → prev tab
      }
    }, { passive: true });

    document.getElementById('app').addEventListener('touchcancel', () => {
      tracking = false; dragging = false;
    }, { passive: true });
  })();

  // ─── Web Share Target ────────────────────────────────────────────
  // When the user taps "Share → The Wishlist" in their browser, the OS
  // opens the app at /?url=<product-url> (per manifest share_target).
  // Detect it, clean the URL from history, and immediately fetch.
  (function handleShareTarget() {
    const p = new URLSearchParams(location.search);
    let sharedUrl = p.get('url') || '';
    if (!sharedUrl) {
      const text = p.get('text') || '';
      const m = text.match(/https?:\/\/\S+/);
      if (m) sharedUrl = m[0];
    }
    if (!sharedUrl) return;
    try { new URL(sharedUrl); } catch { return; }
    history.replaceState({}, '', '/');
    s.screen = 'add-item';
    s.addStep = 'url';
    s.addForm = { ...s.addForm, url: sharedUrl, name: p.get('title') || '' };
    fetchUrl(); // transitions to fetching → form automatically
  })();
  </script>
</body>
