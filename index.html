  <title>The Wishlist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #86EE86; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #fff;
    }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, system-ui, sans-serif;
    }

    /* ─── App root ─── */
    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #fff;
      overflow: hidden;
    }

    /* ─── Safe areas ─── */
    .safe-top {
      height: env(safe-area-inset-top, 44px);
      min-height: 44px;
      flex-shrink: 0;
    }
    .safe-bottom {
      height: max(env(safe-area-inset-bottom), 8px);
      flex-shrink: 0;
    }

    /* ─── Header ─── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      border-bottom: 1px solid #f0f0f0;
      flex-shrink: 0;
      min-height: 44px;
    }
    .h-left, .h-right {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: none;
      border: none;
      font-family: inherit;
      cursor: pointer;
      color: #000;
      padding: 4px 0;
      line-height: 1;
    }
    .h-right { text-align: right; }
    .h-muted { color: #bbb !important; }

    /* ─── Bottom nav ─── */
    .bottom-nav {
      display: flex;
      border-top: 1px solid #f0f0f0;
      background: #fff;
      flex-shrink: 0;
    }
    .nav-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* balance top/bottom so labels appear centered in the full bar including safe area */
      padding-top: calc(10px + env(safe-area-inset-bottom, 0px) * 0.4);
      padding-bottom: calc(6px + env(safe-area-inset-bottom, 0px) * 0.6);
      gap: 4px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }
    .nav-tab span {
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #ccc;
    }
    .nav-tab.active span { color: #000; }
    .nav-dot { width: 4px; height: 4px; background: #000; border-radius: 50%; }

    /* ─── Sub-tab bar (Wishlists / Items / Archive) ─── */
    .sub-tab-bar {
      display: flex;
      border-bottom: 1px solid #f0f0f0;
      background: #fff;
      flex-shrink: 0;
    }
    .sub-tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 11px 0;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }
    .sub-tab span {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #bbb;
    }
    .sub-tab.active span { color: #000; }
    @keyframes wlSlideFromRight { from { transform: translateX(100%); opacity: 0.6; } to { transform: translateX(0); opacity: 1; } }
    @keyframes wlSlideFromLeft  { from { transform: translateX(-100%); opacity: 0.6; } to { transform: translateX(0); opacity: 1; } }
    .wl-slide-from-right { animation: wlSlideFromRight 0.42s cubic-bezier(0.4,0,0.2,1) both; }
    .wl-slide-from-left  { animation: wlSlideFromLeft  0.42s cubic-bezier(0.4,0,0.2,1) both; }

    /* ─── Filter + view-toggle control bar ─── */
    .filter-control-bar {
      display: flex; align-items: stretch; border-bottom: 1px solid #f4f4f4;
      background: #fff; flex-shrink: 0; min-height: 40px; position: relative;
    }
    .filter-pills-scroll {
      flex: 1; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
      padding: 8px 12px; touch-action: pan-x; align-items: center;
    }
    .filter-pills-scroll::-webkit-scrollbar { display: none; }
    .filter-toggle-end {
      display: flex; align-items: center; gap: 0; flex-shrink: 0;
      padding: 0 10px 0 6px; background: #fff; position: sticky; right: 0;
    }
    .filter-toggle-end::before {
      content: ''; display: block; width: 24px; height: 100%;
      background: linear-gradient(to right, transparent, #fff);
      position: absolute; left: -24px; top: 0; pointer-events: none;
    }

    /* ─── Scroll areas ─── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    /* ─── Grid ─── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      background: #fff;
      width: 100%;
      box-sizing: border-box;
    }
    .card {
      min-width: 0;
      overflow: hidden;
      background: #fff;
      cursor: pointer;
    }
    .card:active { opacity: 0.8; }
    .card-image {
      aspect-ratio: 1 / 1;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card-image img { width: 100%; height: 100%; object-fit: contain; }
    .card-image .ph {
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #d0d0d0;
      padding: 12px;
      text-align: center;
      line-height: 1.5;
    }
    .card-meta { padding: 8px 10px 10px; }
    .card-prefix {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 3px;
    }
    .card-days { font-size: 10px; letter-spacing: 0.1em; color: #ccc; }
    .card-name {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #000;
    }
    .card-price {
      font-size: 10px;
      letter-spacing: 0.08em;
      color: #bbb;
      margin-top: 2px;
    }

    /* ─── FAB (floating + button) ─── */
    .fab {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      width: 58px;
      height: 58px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 200;
      box-shadow: 0 2px 16px rgba(0,0,0,0.18);
      -webkit-tap-highlight-color: transparent;
    }
    .fab:active { background: #6ad46a; }
    .fab svg { display: block; }

    /* ─── Shared wishlist footer ─── */
    .shared-footer {
      padding: 28px 24px;
      text-align: center;
      border-top: 1px solid #f0f0f0;
    }

    /* ─── Wishlist folder cards ─── */
    .folder-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #000; }
    .folder-count { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #bbb; margin-top: 2px; }
    .folder-initial {
      font-size: 32px;
      font-weight: 700;
      color: #e8e8e8;
      letter-spacing: -0.02em;
    }

    /* ─── Wishlist collage thumbnail ─── */
    .wl-collage {
      width: 100%; aspect-ratio: 1;
      display: grid; background: #f5f5f5;
      overflow: hidden; gap: 0;
    }
    .wl-collage img { width: 100%; height: 100%; object-fit: contain; background: #fff; display: block; }
    .wl-collage-1 { grid-template-columns: 1fr; }
    .wl-collage-2 { grid-template-columns: 1fr 1fr; }
    .wl-collage-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .wl-collage-3 img:first-child { grid-row: 1 / 3; }
    .wl-collage-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

    /* ─── Wishlist edit mode ─── */
    .card-editing {
      position: relative;
      cursor: grab;
      user-select: none;
    }
    .card-editing:active { cursor: grabbing; opacity: 0.55; }
    .card-drag-over { outline: 2px solid #000; outline-offset: -2px; }
    .wl-delete-btn {
      position: absolute;
      top: 0; right: 0;
      z-index: 10;
      width: 24px; height: 24px;
      background: #000;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 300; line-height: 1;
      cursor: pointer;
    }

    /* ─── Purchased / faded item treatment ─── */
    .card-purchased .card-image img { opacity: 0.42; }
    .card-purchased .card-image .ph { color: #ddd; }
    .card-purchased .card-name { color: #ccc; }
    .card-purchased .card-days { color: #e0e0e0; }
    .card-purchased .card-price { color: #ddd; }
    .card-purchased-tag {
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #bbb;
      margin-top: 2px;
    }

    /* ─── Item delete button (edit mode within wishlist) ─── */
    .item-delete-btn {
      position: absolute;
      top: 0; right: 0;
      z-index: 10;
      width: 22px; height: 22px;
      background: #000;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 300; line-height: 1;
      cursor: pointer;
    }

    /* ─── Wishlist detail cover + sticky scroll ─── */
    .wl-detail-scroll {
      flex: 1;
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      background: #fff;
    }
    .wl-cover-wrap {
      width: 100%;
      height: 230px;
      position: sticky;
      top: 0;
      overflow: hidden;
      background: #ebebeb;
      flex-shrink: 0;
      z-index: 0;
    }
    .wl-cover-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .wl-cover-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.18) 0%, transparent 40%, rgba(0,0,0,0.28) 100%);
      pointer-events: none;
    }
    .wl-edit-cover-btn {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.85);
      border: none;
      padding: 7px 14px;
      cursor: pointer;
      font-family: inherit;
      color: #000;
    }
    .wl-cover-empty-label {
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #ccc;
    }
    .wl-content-wrap {
      position: relative;
      z-index: 2;
      background: #fff;
      margin-top: -1px;
    }
    .wl-sticky-top {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .wl-name-row {
      padding: 12px 20px 12px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .wl-top-metrics {
      border-bottom: 1px solid #f4f4f4;
      background: #fff;
    }
    .wl-name-big {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: block;
    }
    .wl-count-sm {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #bbb;
      display: block;
      margin-top: 2px;
    }
    .view-toggle { display: flex; gap: 2px; align-items: center; flex-shrink: 0; }
    .view-btn {
      background: none; border: none; cursor: pointer;
      padding: 6px; color: #ccc; display: flex; align-items: center;
    }
    .view-btn.active svg rect, .view-btn.active svg path { fill: #000; }
    .view-btn svg rect, .view-btn svg path { fill: #ccc; }

    /* ─── List view rows ─── */
    .list-view { width: 100%; }
    .swipe-row-wrap { position: relative; overflow: hidden; }
    .swipe-delete-bg {
      position: absolute; inset: 0; background: #c0392b;
      display: flex; align-items: center; justify-content: flex-end;
      padding-right: 22px; opacity: 0;
    }
    .swipe-delete-bg span {
      font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: #fff;
    }
    .list-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid #f6f6f6;
      cursor: pointer;
      position: relative;
      user-select: none;
      background: #fff;
      z-index: 1;
    }
    .list-row:active { opacity: 0.75; }
    .list-drag-handle {
      color: #d0d0d0; font-size: 13px; flex-shrink: 0;
      cursor: grab; padding: 0 6px 0 0; touch-action: none; user-select: none;
    }
    .list-row.dragging {
      opacity: 0; pointer-events: none;
    }
    .list-row.drag-over-above {
      box-shadow: inset 0 2px 0 #000;
    }
    .list-row.drag-over-below {
      box-shadow: inset 0 -2px 0 #000;
    }
    .drag-ghost {
      position: fixed; z-index: 1000; pointer-events: none;
      background: #fff; box-shadow: 0 8px 32px rgba(0,0,0,0.14);
      left: 0; width: 100%;
      transition: transform 0.08s ease;
    }
    .list-thumb {
      width: 48px; height: 48px;
      flex-shrink: 0; overflow: hidden; background: #fff;
    }
    .list-thumb img { width: 100%; height: 100%; object-fit: contain; }
    .list-thumb .ph { font-size: 7px; letter-spacing: 0.06em; text-transform: uppercase; color: #d0d0d0; padding: 4px; text-align: center; line-height: 1.4; }
    .list-info { flex: 1; min-width: 0; }
    .list-name {
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #000;
    }
    .list-meta { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: #bbb; margin-top: 2px; }
    .list-price { font-size: 10px; letter-spacing: 0.06em; color: #000; flex-shrink: 0; }
    .list-row-purchased .list-thumb img { opacity: 0.4; }
    .list-row-purchased .list-name { color: #ccc; }
    .list-row-purchased .list-meta { color: #ddd; }
    .list-row-purchased .list-price { color: #ddd; }

    /* ─── Change cover panel ─── */
    .cover-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      border-top: 1px solid #e8e8e8;
      padding: 20px 20px 36px;
      z-index: 60;
    }
    .cover-panel-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 12px;
    }
    .cover-panel-preview {
      width: 100%;
      height: 100px;
      object-fit: cover;
      margin-bottom: 10px;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cover-panel-preview img { width: 100%; height: 100%; object-fit: cover; }

    /* ─── Section title row ─── */
    .section-title-row {
      padding: 14px 20px 12px;
      border-bottom: 1px solid #f4f4f4;
      flex-shrink: 0;
    }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ─── Install Dialog (iOS native style) ─── */
    .install-overlay {
      position: fixed; inset: 0; z-index: 9998;
      background: rgba(0,0,0,0.18);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 0 12px calc(env(safe-area-inset-bottom, 0px) + 20px);
      opacity: 0; transition: opacity 0.22s ease;
    }
    .install-overlay.is-open { opacity: 1; }
    .install-dialog {
      width: 100%; max-width: 360px;
      background: rgba(242,242,247,0.88);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.28), 0 0 0 0.5px rgba(255,255,255,0.3) inset;
      transform: translateY(32px) scale(0.97);
      transition: transform 0.32s cubic-bezier(0.16,1,0.3,1), opacity 0.22s ease;
      opacity: 0;
    }
    .install-overlay.is-open .install-dialog {
      transform: translateY(0) scale(1); opacity: 1;
    }
    /* Header row */
    .install-dlg-header {
      display: flex; align-items: center; gap: 14px;
      padding: 18px 18px 14px; position: relative;
    }
    .install-dlg-icon {
      width: 56px; height: 56px; background: var(--accent);
      border-radius: 14px; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .install-dlg-titles { flex: 1; min-width: 0; }
    .install-dlg-name {
      font-size: 17px; font-weight: 700; color: #000; letter-spacing: -0.01em;
      display: block;
    }
    .install-dlg-sub {
      font-size: 13px; color: rgba(0,0,0,0.45); margin-top: 1px; display: block;
    }
    .install-dlg-close {
      width: 30px; height: 30px;
      background: rgba(0,0,0,0.1);
      border: none; border-radius: 50%;
      font-size: 16px; color: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; font-family: inherit; line-height: 1;
      position: absolute; top: 16px; right: 16px;
    }
    /* Desc */
    .install-dlg-desc {
      padding: 0 18px 16px;
      font-size: 15px; color: #000; line-height: 1.5;
    }
    /* Divider */
    .install-dlg-divider {
      height: 0.5px; background: rgba(0,0,0,0.14); margin: 0 18px;
    }
    /* Action rows */
    .install-dlg-actions { padding: 6px 0; }
    .install-dlg-row {
      display: flex; align-items: center; gap: 14px;
      padding: 11px 18px; cursor: pointer;
      background: none; border: none; width: 100%;
      text-align: left; font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .install-dlg-row:active { background: rgba(0,0,0,0.06); }
    .install-dlg-row-icon {
      width: 38px; height: 38px;
      background: rgba(0,0,0,0.08);
      border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .install-dlg-row-label {
      font-size: 15px; font-weight: 600; color: #000;
    }
    /* Steps screen */
    .install-dlg-steps { padding: 6px 0 4px; }
    .install-dlg-step {
      display: flex; align-items: center; gap: 14px;
      padding: 11px 18px;
    }
    .install-dlg-step-icon {
      width: 38px; height: 38px;
      background: rgba(0,0,0,0.08);
      border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .install-dlg-step-label {
      font-size: 15px; font-weight: 600; color: #000;
    }
    /* Back button */
    .install-dlg-back {
      margin: 4px 12px 14px;
      display: flex; align-items: center; gap: 8px;
      background: rgba(0,0,0,0.08); border: none;
      border-radius: 14px; padding: 14px 20px;
      font-size: 17px; font-weight: 500; color: #000;
      cursor: pointer; font-family: inherit; width: calc(100% - 24px);
    }
    /* Screen swap animation */
    .install-screen { transition: opacity 0.18s ease; }
    .install-screen.hidden { display: none; }

    /* ─── Name prompt ─── */
    .name-prompt {
      position: fixed; inset: 0; background: #fff; z-index: 9999;
      display: flex; flex-direction: column; padding: env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0);
    }
    .name-prompt-hero { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 48px 28px 36px; }
    .name-prompt-title {
      font-size: 48px; font-weight: 800; letter-spacing: -0.025em;
      text-transform: uppercase; line-height: 0.88; color: #000; margin-bottom: 20px;
    }
    .name-prompt-sub { font-size: 11px; letter-spacing: 0.05em; color: #999; line-height: 1.8; text-transform: uppercase; }
    .name-prompt-body { border-top: 1px solid #f0f0f0; padding: 32px 28px; }
    .name-prompt-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: #bbb; margin-bottom: 12px; }
    .name-prompt-input {
      width: 100%; border: none; border-bottom: 2px solid #000;
      font-size: 18px; font-family: inherit; font-weight: 600;
      padding: 8px 0 10px; outline: none; background: none; color: #000;

  let wishlists = [];
  let items = [];
  let availableTags = [];
  let shareData = null; // set when viewing a shared wishlist URL

  function saveData() {
    try {
      localStorage.setItem('vitrine_wishlists', JSON.stringify(wishlists));
      localStorage.setItem('vitrine_items', JSON.stringify(items));
    } catch(e) {}
  }

  function loadData() {
    try {
      const wl = localStorage.getItem('vitrine_wishlists');
      const it = localStorage.getItem('vitrine_items');
      if (wl) wishlists = JSON.parse(wl);
      if (it) items = JSON.parse(it);
    } catch(e) {
      wishlists = [];
      items = [];
    }
  }

  // ═══════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════

  const s = {
    screen: 'wishlists',
    wlSubTab: 'wishlists',  // 'wishlists' | 'items' | 'archive' — sub-tab within the wishlists main tab
    overlay: null,
    currentWid: null,
    currentIid: null,
    fromScreen: null,
    fromWid: null,
    addWid: null,
    addStep: 'url',
    addIsEdit: false,
    wlEditMode: false,
    wlItemEditMode: false,
    wlsViewMode: 'grid',   // view mode for the wishlists overview tab
    wlDetailFilterTags: [], // active tag filters inside a wishlist detail
    wlViewMode: 'list',    // view mode inside a wishlist detail
    itemsViewMode: 'grid',
    itemsFilterTags: [],
    archiveViewMode: 'grid',
    addForm: { url:'', name:'', brand:'', tags:[], img:'', price:'', saved:'', note:'', wid:'', serious:false, showImgEdit: false, showTagInput: false, tagQuery: '', showNewWl: false },
    removingBg: false,
    sharedItemIdx: 0,
    wlSlideDir: null,   // 'right' | 'left' | null — direction for sub-tab slide animation
  };

  let longPressTimer = null;
  let dragSrcIdx = null;
  let deferredInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredInstallPrompt = e; });

  // ═══════════════════════════════════════════
  // HELPERS
  // ═══════════════════════════════════════════

  const pad = n => String(Math.min(Math.max(n,0),999)).padStart(3,'0');
  const days = ts => Math.max(0, Math.floor((Date.now() - ts) / DAY));
  const fmt = n => n.toLocaleString('en-US');
  const money = n => `$${fmt(Math.round((Number(n) || 0) * 100) / 100)}`;
  const fmtDate = ts => new Date(ts).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  const sumPrice = arr => arr.reduce((sum, i) => sum + (Number(i.price) || 0), 0);
  const seriousWatchingItems = (wid=null) => watchingItems(wid).filter(i => !!i.serious);
  const casualWatchingItems = (wid=null) => watchingItems(wid).filter(i => !i.serious);
  const totalWatchingValue = (wid=null) => sumPrice(watchingItems(wid));
  const seriousWatchingValue = (wid=null) => sumPrice(seriousWatchingItems(wid));
  const casualWatchingValue = (wid=null) => sumPrice(casualWatchingItems(wid));
  const letGoItems = () => archivedItems().filter(i => i.reason === 'let_go');
  const letGoValue = () => sumPrice(letGoItems());
  const savedAmount = item => Math.max(0, Number(item?.saved) || 0);
  const totalSaved = (wid=null) => watchingItems(wid).reduce((sum, i) => sum + savedAmount(i), 0);
  const totalLeft = (wid=null) => Math.max(0, totalWatchingValue(wid) - totalSaved(wid));
  const gapAmount = item => Math.max((Number(item?.price) || 0) - savedAmount(item), 0);
  const progressPct = item => {
    const price = Number(item?.price) || 0;
    if (!price) return 0;
    return Math.max(0, Math.min(100, Math.round((savedAmount(item) / price) * 100)));
  };

  const watchingItems = (wid=null) => items
    .filter(i => i.status === 'watching' && (wid ? i.wid === wid : true))
    .sort((a,b) => b.addedAt - a.addedAt);
  const wishlistItems = (wid) => items
    .filter(i => (i.status === 'watching' || i.status === 'purchased') && i.wid === wid)
    .sort((a,b) => {
      if (a.status === 'purchased' && b.status !== 'purchased') return 1;
      if (b.status === 'purchased' && a.status !== 'purchased') return -1;
      const ao = a.order ?? a.addedAt;
      const bo = b.order ?? b.addedAt;
      return bo - ao;
    });
  const archivedItems = () => items
    .filter(i => i.status === 'archived')
    .sort((a,b) => (b.archivedAt||0)-(a.archivedAt||0));
  const getItem = id => items.find(i => i.id === id);
  const getWl = id => wishlists.find(w => w.id === id);
  const wlCover = wid => {
    const it = watchingItems(wid)[0];
    return it?.img || null;
  };

  // ═══════════════════════════════════════════
  // RENDER ENGINE
  // ═══════════════════════════════════════════

  let toastTimer;

  function render() {
    document.getElementById('app').innerHTML = buildScreen();
    if (s.overlay && s.overlay !== 'change-cover') {
      document.getElementById('app').insertAdjacentHTML('beforeend', buildOverlay());
    }
    setTimeout(() => {
      if (s.screen === 'add-item' && s.addStep === 'url') {
        document.getElementById('url-field')?.focus();
      }
      if (s.screen === 'add-wishlist') {
        document.getElementById('wl-name-input')?.focus();
      }
    }, 60);
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
  }

  // ═══════════════════════════════════════════
  // COMPONENTS
  // ═══════════════════════════════════════════

  function nav(active) {
    // active = 'wishlists' | 'stats' | 'profile'
    const tabs = ['wishlists','stats','profile'];
    const labels = { wishlists:'Wishlists', stats:'Stats', profile:'Profile' };
    return `
      <nav class="bottom-nav">
        ${tabs.map(t => `
          <button class="nav-tab ${active===t?'active':''}" onclick="navTab('${t}')">
            <span>${labels[t]}</span>
            ${active===t ? '<div class="nav-dot"></div>' : ''}
          </button>`).join('')}
      </nav>`;
  }

  function subTabBar(active) {
    // active = 'wishlists' | 'items' | 'archive'
    const tabs = ['wishlists','items','archive'];
    const labels = { wishlists:'Wishlists', items:'Items', archive:'Archive' };
    return `
      <div class="sub-tab-bar">
        ${tabs.map(t => `
          <button class="sub-tab ${active===t?'active':''}" onclick="setWlSubTab('${t}')">
            <span>${labels[t]}</span>
          </button>`).join('')}
      </div>`;

  function fab(action, hasNav=true) {
    const bottom = hasNav
      ? 'calc(env(safe-area-inset-bottom, 0px) + 52px)'
      : 'calc(env(safe-area-inset-bottom, 0px) + 14px)';
    return `<button class="fab" style="bottom:${bottom}" onclick="${action}" aria-label="Add">
      <svg width="22" height="22" viewBox="0 0 20 20" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round">
        <line x1="10" y1="3" x2="10" y2="17"/><line x1="3" y1="10" x2="17" y2="10"/>
      </svg>
    </button>`;
  }

  function itemCard(item, idx=0) {
    const d = days(item.addedAt);
    const purchased = item.status === 'purchased';
    const imgH = item.img
      ? `<img src="${item.img}" alt="${esc(item.name)}" loading="lazy" />`
      : `<div class="ph">${esc(item.name)}</div>`;
    const deleteBtn = s.wlItemEditMode
      ? `<div class="item-delete-btn" onclick="removeItem(event,'${item.id}')">×</div>` : '';
    const dragAttrs = s.wlItemEditMode
      ? `draggable="true"
         ondragstart="itemDragStart(event,${idx})"
         ondragover="itemDragOver(event,${idx})"
         ondragleave="itemDragLeave(event)"
         ondrop="itemDrop(event,${idx})"
         ondragend="itemDragEnd(event)"` : '';
    const clickAttr = s.wlItemEditMode ? '' : `onclick="openItem('${item.id}')"`;
    const lpAttrs = s.wlItemEditMode ? '' :
      `onpointerdown="itemLongPressStart(event,'${item.id}')"
       onpointerup="itemLongPressCancel()"
       onpointermove="itemLongPressCancel()"
       onpointerleave="itemLongPressCancel()"`;
    return `
      <div class="card ${purchased ? 'card-purchased' : ''}" ${clickAttr} ${dragAttrs} ${lpAttrs} style="position:relative">
        ${deleteBtn}
        <div class="card-image">${imgH}</div>
        ${item.price && !purchased ? `<div class="mini-progress"><div class="mini-progress-fill" style="width:${progressPct(item)}%"></div></div>` : ''}
        <div class="card-meta">
          <div class="card-prefix"><span class="card-days">${pad(d)}</span></div>
          ${item.brand ? `<p class="card-days" style="letter-spacing:0.12em">${esc(item.brand.toUpperCase())}</p>` : ''}
          <p class="card-name">${esc(item.name)}</p>
          ${purchased ? `<p class="card-purchased-tag">Purchased</p>` : ''}
          ${item.serious && !purchased ? `<p class="card-purchased-tag">Serious</p>` : ''}
          ${item.price && !purchased ? `<p class="card-price">${money(item.price)}</p>` : ''}
        </div>
      </div>`;
  }

  function wishlistCollage(wid) {
    if (getWl(wid)?.coverImg) {
      return `<img src="${getWl(wid).coverImg}" alt="" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block" />`;
    }
    const imgs = watchingItems(wid).filter(i => i.img).slice(0, 4);
    if (imgs.length === 0) {
      const wl = getWl(wid);
      return `<div class="folder-initial">${wl?.name[0]?.toUpperCase() || '?'}</div>`;
    }
    const n = imgs.length;
    return `<div class="wl-collage wl-collage-${n}">
      ${imgs.map(i => `<img src="${i.img}" alt="" loading="lazy" />`).join('')}
    </div>`;
  }

  function wishlistCard(wl, idx) {
    const count = watchingItems(wl.id).length;
    const thumbH = wishlistCollage(wl.id);

    if (s.wlEditMode) {
      return `
        <div class="card card-editing"
          draggable="true"
          ondragstart="wlDragStart(event,${idx})"
          ondragover="wlDragOver(event,${idx})"
          ondragleave="wlDragLeave(event)"
          ondrop="wlDrop(event,${idx})"
          ondragend="wlDragEnd(event)">
          <div class="wl-delete-btn" onclick="deleteWishlist('${wl.id}')">−</div>
          <div class="card-image" style="overflow:hidden">${thumbH}</div>
          <div class="card-meta">
            <p class="folder-label">${esc(wl.name.toUpperCase())}</p>
            <p class="folder-count">${count} ${count===1?'Item':'Items'}</p>
          </div>
        </div>`;
    }

    return `
      <div class="card"
        onclick="openWl('${wl.id}')"
        onpointerdown="wlLongPressStart()"
        onpointerup="wlLongPressCancel()"
        onpointermove="wlLongPressCancel()"
        onpointerleave="wlLongPressCancel()">
        <div class="card-image" style="overflow:hidden">${thumbH}</div>
        <div class="card-meta">
          <p class="folder-label">${esc(wl.name.toUpperCase())}</p>
          <p class="folder-count">${count} ${count===1?'Item':'Items'}</p>
        </div>
      </div>`;
  }

  function wishlistListRow(wl, idx) {
    const count = watchingItems(wl.id).length;
    const totalVal = totalWatchingValue(wl.id);
    const thumb = wishlistCollage(wl.id);
    const deleteBtn = s.wlEditMode
      ? `<div class="list-delete-btn" onclick="deleteWishlist('${wl.id}')">×</div>` : '';
    const dragAttrs = s.wlEditMode
      ? `draggable="true"
         ondragstart="wlDragStart(event,${idx})"
         ondragover="wlDragOver(event,${idx})"
         ondragleave="wlDragLeave(event)"
         ondrop="wlDrop(event,${idx})"
         ondragend="wlDragEnd(event)"` : '';
    const clickAttr = s.wlEditMode ? '' : `onclick="openWl('${wl.id}')"`;
    return `
      <div class="list-row ${s.wlEditMode ? 'card-editing' : ''}" ${clickAttr} ${dragAttrs} style="position:relative">

          <p class="list-meta">${count} ${count===1?'Item':'Items'}${totalVal ? ` · ${money(totalVal)}` : ''}</p>
        </div>
      </div>`;
  }

  function installShowSteps() {
    const s1 = document.getElementById('install-screen-1');
    const s2 = document.getElementById('install-screen-2');
    if (!s1 || !s2) return;
    s1.classList.add('hidden');
    s2.classList.remove('hidden');
  }

  function installShowMain() {
    const s1 = document.getElementById('install-screen-1');
    const s2 = document.getElementById('install-screen-2');
    if (!s1 || !s2) return;
    s2.classList.add('hidden');
    s1.classList.remove('hidden');
  }

  async function triggerInstall() {
    if (!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    const result = await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    if (result.outcome === 'accepted') dismissOnboarding();
  }

  function getUserName() {
    try { return localStorage.getItem('vtr_user_name') || ''; } catch(e) { return ''; }
  }

  function saveUserName(name) {
    try { localStorage.setItem('vtr_user_name', name.trim()); } catch(e) {}
  }

  function showNamePrompt() {
    document.getElementById('app').innerHTML = `
      <div class="name-prompt" id="name-prompt">
        <div class="name-prompt-hero">
          <p class="ob-eyebrow">The Wishlist</p>
          <h1 class="name-prompt-title">What's<br/>your<br/>name?</h1>
          <p class="name-prompt-sub">So your wishlists feel<br/>personal when shared.</p>
        </div>
        <div class="name-prompt-body">
          <p class="name-prompt-label">Your name</p>
          <input class="name-prompt-input" id="name-prompt-input" type="text"
            placeholder="First name" autocomplete="given-name" autocorrect="off"
            onkeydown="if(event.key==='Enter')confirmName()" />
        </div>
        <div class="name-prompt-actions">
          <button class="name-prompt-cta" onclick="confirmName()">Continue</button>
          <button class="name-prompt-skip" onclick="skipName()">Skip for now</button>
        </div>
      </div>`;
    setTimeout(() => {
      const el = document.getElementById('name-prompt-input');
      if (el) el.focus();
    }, 100);
  }

  function confirmName() {
    const el = document.getElementById('name-prompt-input');
    const name = el ? el.value.trim() : '';
    if (name) saveUserName(name);
    render();
  }

  function skipName() {
    render();
  }

  function dismissOnboarding() {
    try { localStorage.setItem('vtr_ob_dismissed', '1'); } catch(e) {}
    const overlay = document.getElementById('install-overlay-el');
    if (overlay) {
      overlay.classList.remove('is-open');
      setTimeout(() => overlay.remove(), 240);
    }
    if (!getUserName()) {
      setTimeout(() => showNamePrompt(), 260);
    }
  }

  function buildScreen() {
    switch(s.screen) {
      case 'wishlists':       return screenWlTab();
      case 'wishlist-detail': return screenWlDetail();
      case 'items':           return screenWlTab();
      case 'archive':         return screenWlTab();
      case 'stats':           return screenStats();
      case 'profile':         return screenProfile();
      case 'item-detail':     return screenItemDetail();
      case 'add-wishlist':    return screenAddWishlist();
      case 'add-item':        return screenAddItem();
      case 'shared-wl':       return screenSharedWl();
      case 'shared-item':     return screenSharedItemDetail();
      default: return screenWlTab();
    }
  }

  // Wraps wishlists/items/archive into a single tabbed view
  // Uses s.screen as source of truth so direct screen assignments work correctly
  function screenWlTab() {
    s.wlSubTab = s.screen; // keep in sync
    switch(s.screen) {
      case 'items':   return screenItems();
      case 'archive': return screenArchive();
      default:        return screenWishlists();
    }
  }

  // ═══════════════════════════════════════════
  // SHARED WISHLIST VIEW (read-only)
  // ═══════════════════════════════════════════

  function sharedItemCard(item, idx) {
    const d = item.addedAt ? Math.floor((Date.now() - new Date(item.addedAt)) / 86400000) : 0;
    const imgH = item.img
      ? `<img src="${esc(item.img)}" alt="${esc(item.name)}" loading="lazy" />`
      : `<div class="ph">${esc(item.name)}</div>`;
    return `
      <div class="card" onclick="openSharedItem(${idx})">
        <div class="card-image">${imgH}</div>

  // ── Share encoding: compact keys + deflate compression ──────────
  // New format: 'z' + URL-safe base64 of deflate-compressed compact JSON
  // Legacy format: plain base64 JSON (still decoded for backward compat)
  async function encodeShare(payload) {
    const compact = {
      v: 2,
      w: { n: payload.wl.name, c: payload.wl.coverImg || '' },
      ...(payload.senderName ? { s: payload.senderName } : {}),
      i: payload.items.map(i => ({
        n: i.name, b: i.brand || '', m: i.img || '',
        p: i.price || '', u: i.url || '',
        ...(i.tags?.length ? { t: i.tags } : {}),
        ...(i.note       ? { o: i.note  } : {}),
        a: i.addedAt,
      }))
    };
    const json = JSON.stringify(compact);
    if (typeof CompressionStream !== 'undefined') {
      try {
        const cs = new CompressionStream('deflate-raw');
        const w = cs.writable.getWriter();
        w.write(new TextEncoder().encode(json));
        w.close();
        const r = cs.readable.getReader();
        const chunks = [];
        while (true) { const { done, value } = await r.read(); if (done) break; chunks.push(value); }
        const buf = new Uint8Array(chunks.reduce((s, c) => s + c.length, 0));
        let off = 0; for (const c of chunks) { buf.set(c, off); off += c.length; }
        return 'z' + btoa(String.fromCharCode(...buf)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
      } catch {}
    }
    return btoa(unescape(encodeURIComponent(json)));
  }

  function expandShare(obj) {
    if (!obj) return null;
    if (obj.w) return {  // v2 compact format
      wl: { name: obj.w.n || '', coverImg: obj.w.c || '' },
      senderName: obj.s || '',
      items: (obj.i || []).map(i => ({
        name: i.n || '', brand: i.b || '', img: i.m || '',
        price: i.p || '', url: i.u || '',
        tags: i.t || [], note: i.o || '', addedAt: i.a
      }))
    };
    return obj; // legacy full-key format
  }

  async function decodeShare(str) {
    try {
      if (str.startsWith('z') && typeof DecompressionStream !== 'undefined') {
        const b64 = str.slice(1).replace(/-/g,'+').replace(/_/g,'/');
        const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        const ds = new DecompressionStream('deflate-raw');
        const w = ds.writable.getWriter(); w.write(bytes); w.close();
        const r = ds.readable.getReader(); const chunks = [];
        while (true) { const { done, value } = await r.read(); if (done) break; chunks.push(value); }
        const buf = new Uint8Array(chunks.reduce((s, c) => s + c.length, 0));
        let off = 0; for (const c of chunks) { buf.set(c, off); off += c.length; }
        return expandShare(JSON.parse(new TextDecoder().decode(buf)));
      }
      return expandShare(JSON.parse(decodeURIComponent(escape(atob(str)))));
    } catch(e) { return null; }
  }

  function screenStats() {
    const watching = watchingItems();
    const purchased = items.filter(i => i.status === 'purchased');
    const letGo = letGoItems();
    const decided = purchased.length + letGo.length;

    // Conviction rate: of all decisions made, what % ended in a buy
    const convictionRate = decided >= 3
      ? Math.round((purchased.length / decided) * 100)
      : null;

    // Average days from save → buy
    const withBuyTime = purchased.filter(i => i.archivedAt && i.addedAt);
    const avgBuyDays = withBuyTime.length > 0
      ? Math.round(withBuyTime.reduce((s, i) => s + Math.floor((i.archivedAt - i.addedAt) / DAY), 0) / withBuyTime.length)
      : null;

    // Average days from save → let go
    const withLetGoTime = letGo.filter(i => i.archivedAt && i.addedAt);
    const avgLetGoDays = withLetGoTime.length > 0
      ? Math.round(withLetGoTime.reduce((s, i) => s + Math.floor((i.archivedAt - i.addedAt) / DAY), 0) / withLetGoTime.length)
      : null;

    // Impulse resisted: watched 30+ days, then let go without buying
    const impulseResisted = letGo.filter(i =>
      i.archivedAt && i.addedAt && Math.floor((i.archivedAt - i.addedAt) / DAY) >= 30
    ).length;

    const moneyNotSpent = letGoValue();
    const purchasedValue = sumPrice(purchased);
    const watchingValue = totalWatchingValue();

    // Top brand across all items ever
    const brandCounts = {};
    items.forEach(i => { if (i.brand?.trim()) brandCounts[i.brand.trim()] = (brandCounts[i.brand.trim()] || 0) + 1; });
    const topBrand = Object.entries(brandCounts).sort((a,b) => b[1]-a[1])[0] || null;

    // Top tag across all items ever
    const tagCounts = {};
    items.forEach(i => (i.tags||[]).forEach(t => { if (t) tagCounts[t] = (tagCounts[t] || 0) + 1; }));
    const topTag = Object.entries(tagCounts).sort((a,b) => b[1]-a[1])[0] || null;

    // Longest currently-watching item
    const oldest = watching.length > 0
      ? watching.reduce((a, b) => a.addedAt < b.addedAt ? a : b)
      : null;
    const oldestDays = oldest ? days(oldest.addedAt) : 0;

    const statRow = (label, value, sub='') => `
      <div class="profile-stat-row">
        <span class="profile-stat-label">${label}</span>
        <div style="text-align:right">
          <span class="profile-stat-val">${value}</span>
          ${sub ? `<p style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#ccc;margin-top:2px">${sub}</p>` : ''}
        </div>
      </div>`;

    const bigStat = (number, label, sub='') => `
      <div style="padding:20px 0;border-bottom:1px solid #f4f4f4">
        <p style="font-size:48px;font-weight:800;letter-spacing:-0.03em;line-height:1;color:#000;margin-bottom:6px">${number}</p>
        <p style="font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#bbb">${label}</p>
        ${sub ? `<p style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#ccc;margin-top:3px">${sub}</p>` : ''}
      </div>`;

    const sectionLabel = label => `
      <p style="font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#bbb;margin-top:36px;padding-bottom:10px;border-bottom:1px solid #f4f4f4">${label}</p>`;

    if (items.length === 0) {
      return `
        <div class="safe-top"></div>
        <header><span class="h-left">Stats</span></header>
        <div class="scroll-area">
          <div class="empty-state">
            <p class="empty-hero">no<br/>data<br/>yet</p>
            <p style="margin-top:20px;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#ccc;text-align:left">Start saving items to see your patterns</p>
          </div>
        </div>
        ${nav('stats')}`;
    }

    return `
      <div class="safe-top"></div>
      <header>
        <span class="h-left">Stats</span>
      </header>
      <div class="scroll-area">
        <div style="padding:36px 28px 80px">

          <p class="profile-hero" style="margin-bottom:8px">Your<br/>Desire<br/>Report</p>

          ${sectionLabel('Decisions')}
          ${convictionRate !== null
            ? bigStat(`${convictionRate}%`, 'Conviction Rate', `${purchased.length} bought &middot; ${letGo.length} let go`)
            : `<p style="padding:18px 0;border-bottom:1px solid #f4f4f4;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#ccc">Archive a few items to see your conviction rate</p>`}
          ${avgBuyDays !== null ? statRow('Avg Days to Buy', avgBuyDays + 'd') : ''}
          ${avgLetGoDays !== null ? statRow('Avg Days to Let Go', avgLetGoDays + 'd') : ''}

          ${(impulseResisted > 0 || moneyNotSpent > 0) ? sectionLabel('Discipline') : ''}
          ${impulseResisted > 0 ? bigStat(impulseResisted, 'Impulse' + (impulseResisted === 1 ? '' : 's') + ' Resisted', 'Watched 30+ days, then let go') : ''}
          ${moneyNotSpent > 0 ? statRow('Money Not Spent', money(moneyNotSpent)) : ''}
          ${purchasedValue > 0 ? statRow('Total Purchased', money(purchasedValue)) : ''}

          ${(topBrand || topTag) ? sectionLabel('Your Pattern') : ''}
          ${topBrand ? statRow('Most Saved Brand', esc(topBrand[0]), topBrand[1] + ' ' + (topBrand[1] === 1 ? 'item' : 'items')) : ''}
          ${topTag ? statRow('Top Category', esc(topTag[0]), topTag[1] + ' ' + (topTag[1] === 1 ? 'item' : 'items')) : ''}

          ${sectionLabel('Right Now')}
          ${statRow('Watching', watching.length + ' ' + (watching.length === 1 ? 'Item' : 'Items'))}
          ${watchingValue > 0 ? statRow('Total Desire Value', money(watchingValue)) : ''}

          ${oldest ? `
          ${sectionLabel('Longest Watch')}
          <div onclick="openItem('${oldest.id}')" style="display:flex;gap:16px;align-items:center;padding:16px 0;border-bottom:1px solid #f4f4f4;cursor:pointer">
            <div style="width:56px;height:56px;background:#f9f9f9;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center">
              ${oldest.img
                ? `<img src="${esc(oldest.img)}" style="width:100%;height:100%;object-fit:contain" />`
                : `<span style="font-size:8px;letter-spacing:0.06em;text-transform:uppercase;color:#ccc;text-align:center;padding:4px;line-height:1.4">${esc(oldest.name)}</span>`}
            </div>
            <div style="flex:1;min-width:0">
              <p style="font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:#bbb;margin-bottom:4px">${pad(oldestDays)} Days</p>
              <p style="font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:#000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(oldest.name)}</p>
              ${oldest.price ? `<p style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#bbb;margin-top:3px">${money(oldest.price)}</p>` : ''}
            </div>
            <span style="font-size:18px;color:#ddd;flex-shrink:0">›</span>
          </div>` : ''}

        </div>
      </div>
      ${nav('stats')}`;
  }

          <div class="form-group">
            <label class="form-label">Intent</label>
            <input type="hidden" id="f-serious" value="${f.serious ? 'serious' : 'casual'}" />
            <div class="intent-pill-row">
              <button type="button" class="intent-pill ${f.serious ? '' : 'active'}" id="intent-casual" onclick="setAddIntent('casual')">Casual</button>
              <button type="button" class="intent-pill ${f.serious ? 'active' : ''}" id="intent-serious" onclick="setAddIntent('serious')">Serious</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Note</label>
            <textarea class="form-input" id="f-note">${esc(f.note)}</textarea>

          <div class="form-group">
            <label class="form-label">Wishlist</label>
            <input type="hidden" id="f-wid" value="${esc(selectedWid)}" />
            <div class="wl-picker">
              ${wishlists.map(w => `
                <button type="button" class="wl-picker-pill ${selectedWid === w.id ? 'active' : ''}" onclick="setFormWl('${w.id}')">${esc(w.name)}</button>
              `).join('')}
              ${f.showNewWl
                ? `<input class="wl-new-wl-input" id="wl-new-wl-input" type="text"
                     placeholder="Name..."
                     onkeydown="if(event.key==='Enter'){event.preventDefault();createFormWl()}"
                     onblur="createFormWlBlur()" />`
                : `<button type="button" class="wl-picker-pill wl-picker-add" onclick="openNewWlInput()">+</button>`}
            </div>
          </div>
          <button class="btn btn-black" onclick="saveItem()">
            ${s.addIsEdit ? 'Save Changes' : 'Save to Wishlist'}

          ${s.addIsEdit ? `
          <button onclick="openDeleteOverlay(s.currentIid)" style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:#bbb;text-decoration:underline;text-underline-offset:3px;padding:8px 0;width:100%;text-align:center;margin-top:4px">
            Delete
          </button>` : ''}
        </div>
      </div>`;
  }

  function buildOverlay() {
    if (s.overlay === 'delete') {
      const item = getItem(s.currentIid);
      const words = item ? item.name.split(' ').slice(0,3).join('\n') : 'This Item';
      return `
        <div class="overlay">
          <div class="safe-top"></div>
          <div class="overlay-body">
            <p class="overlay-title-sm">This Cannot Be Undone</p>
            <p class="overlay-headline" style="white-space:pre-line">Delete\n${words}?</p>
            <div class="overlay-btns">
              <button class="btn btn-black" onclick="confirmDelete()">Delete Permanently</button>
              <button class="btn btn-ghost" onclick="closeOverlay()">Cancel</button>
            </div>
          </div>
        </div>`;
    }
    if (s.overlay === 'move-wl') {
      return `
        <div class="overlay" onclick="if(event.target===this)closeOverlay()">
          <div class="safe-top"></div>
          <div class="overlay-body">
            <p class="overlay-title-sm">Add to Wishlist</p>
            <div class="wl-move-list">
              ${wishlists.map(w => `

            </div>
            <button class="btn btn-ghost" style="margin-top:16px" onclick="closeOverlay()">Cancel</button>
          </div>
        </div>`;
    }
    return '';
  }

    s.wlItemEditMode = false;

    // Keep wlSubTab in sync so the sub-tab indicator stays correct
    if (screen === 'wishlists' || screen === 'items' || screen === 'archive') {
      s.wlSubTab = screen;
      s.currentWid = null;
      s.wlDetailFilterTags = [];
    }
    render();

  // Bottom nav tab handler — maps the 3 main tabs to screens
  function navTab(tab) {
    s.overlay = null;
    s.wlItemEditMode = false;
    s.wlEditMode = false;
    if (tab === 'wishlists') {
      const SUB_TABS = ['wishlists', 'items', 'archive'];
      const fromIdx = SUB_TABS.indexOf(s.screen);
      // If already on a sub-tab that isn't wishlists, slide back to wishlists
      if (fromIdx > 0) {
        s.wlSlideDir = 'left';
      } else if (fromIdx === -1) {
        // Coming from a non-sub-tab screen (detail, stats, etc.) — no slide
        s.wlSlideDir = null;
      }
      s.screen = 'wishlists';
      s.wlSubTab = 'wishlists';
      s.currentWid = null;
      render();
      s.wlSlideDir = null;
    } else if (tab === 'stats') {
      s.screen = 'stats';
      render();
    } else if (tab === 'profile') {
      s.screen = 'profile';
      render();
    }
  }

  // Switch between sub-tabs (Wishlists / Items / Archive) within the wishlists main tab
  function setWlSubTab(tab) {
    const SUB_TABS = ['wishlists', 'items', 'archive'];
    const fromIdx = SUB_TABS.indexOf(s.screen);
    const toIdx   = SUB_TABS.indexOf(tab);
    if (toIdx !== fromIdx) s.wlSlideDir = toIdx > fromIdx ? 'right' : 'left';
    s.wlSubTab = tab;
    s.screen = tab;
    s.overlay = null;
    s.wlEditMode = false;
    render();
    s.wlSlideDir = null;

    try {
      const text = await navigator.clipboard.readText();
      if (!text) return;
      try { new URL(text); } catch { showToast('No link found — copy a product URL first.'); return; }
      s.addForm.url = text;
      fetchUrl();
    } catch {
      showToast('Tap Paste when prompted.');
    }
  }

  // Detect Cloudflare/CDN challenge pages, error pages, bot-protection walls, etc.
  function isBlockedPage(html, title) {
    const t = (title || '').toLowerCase().trim();
    const JUNK = [
      'just a moment', 'checking your browser', 'please wait',
      'access denied', '403 forbidden', '401 unauthorized',
      'please enable javascript', 'please enable cookies',
      'are you a robot', 'robot or human', 'ddos protection',
      'attention required', 'security check', 'one moment please',
      'enable javascript and cookies', 'verify you are human',
      'sorry, you have been blocked', 'captcha',
      // CloudFront / CDN error pages
      'request could not be satisfied', 'error occurred when we tried',
      '404 not found', '500 internal server', 'service unavailable',
      'bad gateway', 'gateway timeout',
    ];
    if (JUNK.some(j => t.includes(j))) return true;
    // Title starts with "ERROR" or "error" with no product-like content
    if (/^error[:\s]/i.test(t)) return true;
    if (!t) return true; // no title at all = not a product page
    // Cloudflare JS challenge HTML markers
    if (html.includes('cf-browser-verification') ||
        html.includes('_cf_chl_opt') ||
        html.includes('cdn-cgi/challenge-platform') ||
        html.includes('jschl_answer') ||
        html.includes('cf_chl_2') ||
        html.includes('__cf_chl_rt_tk')) return true;
    return false;
  }

  // Strip UTM/ad tracking params that bloat URLs and can trigger bot detection
  function cleanUrl(urlStr) {
    try {
      const u = new URL(urlStr);
      const TRACKING = [
        'utm_source','utm_medium','utm_campaign','utm_content','utm_term','utm_id',
        'gclid','gclsrc','gbraid','wbraid','fbclid','msclkid','ttclid','twclid',
        'gad_source','gad_campaignid','campaignid','adgroupid','adpos','creative',
        'device','matchtype','network','targetid','pla_sku','pla_country','pcat','storeid',
        'cm_mmc','cm_sp','cm_re','a','ref','referrer','source','mc_cid','mc_eid','_ga','_gl',
      ];
      const toDelete = [...u.searchParams.keys()].filter(k => TRACKING.includes(k) || /^vtp\d+$/i.test(k));
      toDelete.forEach(k => u.searchParams.delete(k));
      return u.toString();
    } catch { return urlStr; }
  }

  // Extract product name/brand from URL slug when all proxies fail
  function parseUrlFallback(urlStr) {
    try {
      const u = new URL(urlStr);
      const host = u.hostname.replace(/^www\./, '');
      const parts = u.pathname.split('/').filter(Boolean).map(p => p.split('?')[0]);

      function slugToTitle(s) {
        return s.replace(/-\d{5,}$/, '').split('-').filter(Boolean)
          .map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ').trim();
      }

      let brand = '', name = '', img = '';

      // Net-a-Porter: /en-us/shop/product/{brand}/{cat}/{subcat}/{product-slug}/{id}
      if (host.includes('net-a-porter.com') || host.includes('mrporter.com')) {
        const idx = parts.indexOf('product');
        if (idx >= 0) {
          brand = slugToTitle(parts[idx + 1] || '');
          name  = slugToTitle(parts[idx + 4] || parts[idx + 3] || '');
          // NAP product images follow a predictable CDN pattern keyed on numeric product ID
          const productId = parts[parts.length - 1];
          if (/^\d{10,}$/.test(productId)) {
            img = `https://www.net-a-porter.com/variants/images/${productId}/in/w2000_q60.jpg`;
          }
        }
      }
      // SSENSE: /en-us/{gender}/product/{brand}/{product-slug}/p{id}
      else if (host.includes('ssense.com')) {
        const pIdx = parts.indexOf('product');
        if (pIdx >= 0) {
          brand = slugToTitle(parts[pIdx + 1] || '');
          name  = slugToTitle((parts[pIdx + 2] || '').replace(/-p\d+$/, ''));
        } else {
          // Fallback: skip locale + gender/category words
          const SKIP = /^[a-z]{2}-[a-z]{2}$|^(women|men|everything|kids|lifestyle|sale|new|designers)$/i;
          const seg = parts.filter(p => !SKIP.test(p));
          brand = slugToTitle(seg[0] || '');
          name  = slugToTitle((seg[1] || '').replace(/-p\d+$/, ''));
        }
      }
      // Mytheresa: /us-en/p/{product-slug}-{sku}.html
      else if (host.includes('mytheresa.com')) {
        const pIdx = parts.indexOf('p');
        if (pIdx >= 0) name = slugToTitle(parts[pIdx + 1]?.replace(/\.html$/, '').replace(/-[a-z0-9]{4,10}$/, '') || '');
      }
      // Bloomingdale's: /shop/product/{product-slug}?ID={id}
      else if (host.includes('bloomingdales.com')) {
        const pIdx = parts.indexOf('product');
        const slug = pIdx >= 0 ? (parts[pIdx + 1] || '') : (parts[parts.length - 1] || '');
        name = slugToTitle(slug);
        brand = 'Bloomingdale\'s';
      }
      // CB2: /{product-slug}/s{sku}
      else if (host.includes('cb2.com')) {
        brand = 'CB2';
        name  = slugToTitle((parts[0] || '').replace(/-s\d+$/, ''));
      }
      // Crate & Barrel: /p/{product-slug}/{sku} or /{product-slug}/r{sku}
      else if (host.includes('crateandbarrel.com')) {
        brand = 'Crate & Barrel';
        const pIdx = parts.indexOf('p');
        name = slugToTitle(pIdx >= 0 ? (parts[pIdx + 1] || '') : (parts[0] || '').replace(/-r\d+$/, ''));
      }
      // Farfetch: /shopping/{product-slug}-item-{id}.aspx
      else if (host.includes('farfetch.com')) {
        const seg = parts.find(p => p.includes('-item-')) || parts[parts.length - 1] || '';
        name = slugToTitle(seg.replace(/-item-\d+\.aspx$/, '').replace(/\.aspx$/, ''));
      }
      // Browns Fashion: /en-us/{brand}/{product-slug}
      else if (host.includes('brownsfashion.com')) {
        const nonLocale = parts.filter(p => !/^[a-z]{2}(-[a-z]{2})?$/.test(p));
        brand = slugToTitle(nonLocale[0] || '');
        name  = slugToTitle(nonLocale[1] || '');
      }
      // Matches / MatchesFashion: /{brand}/{product-slug}
      else if (host.includes('matchesfashion.com')) {
        brand = slugToTitle(parts[0] || '');
        name  = slugToTitle(parts[1] || '');
      }
      // TheRealReal: /products/{gender}/{category}/{subcategory}/{brand-slug}-{product-slug}-{sku}
      else if (host.includes('therealreal.com')) {
        const slug = parts[parts.length - 1] || '';
        // Strip trailing SKU — short alphanumeric segment containing at least one digit
        const withoutSku = slug.replace(/-([a-z0-9]{3,8})$/i, (_, s) => /[0-9]/.test(s) ? '' : `-${s}`);
        const segs = withoutSku.split('-').filter(Boolean);
        // First word = brand, remainder = product name
        brand = slugToTitle(segs[0] || '');
        name  = slugToTitle(segs.slice(1).join('-'));
      }
      // Shopify: /products/{product-slug}
      else if (parts.includes('products')) {
        const pIdx = parts.indexOf('products');
        // Skip gender/category segments — take the last path segment as the product
        const slug = parts[parts.length - 1] || '';
        name = slugToTitle(slug);
        // Infer brand from hostname, skipping common prefixes
        const SKIP_HOST = new Set(['www','shop','store','us','uk','ca','en']);
        const brandSeg = host.split('.').find(s => !SKIP_HOST.has(s) && s.length > 1);
        if (brandSeg) brand = brandSeg.charAt(0).toUpperCase() + brandSeg.slice(1);
      }
      // Generic: longest hyphenated path segment = product name
      else {
        const candidates = parts
          .filter(p => p.includes('-') && p.length > 10)
          .sort((a, b) => b.split('-').length - a.split('-').length);
        name = candidates.length ? slugToTitle(candidates[0]) : '';
      }

      return (name || brand) ? { name, brand, img } : null;
    } catch { return null; }
  }

  function cleanTitle(t) {
    t = (t || '').trim();
    // Strip up to two trailing "| Site Name" or "– Brand" suffixes
    t = t.replace(/\s*[\|\u2014\u2013\-][^\|\u2014\u2013\-]{2,60}$/, '').trim();
    t = t.replace(/\s*[\|\u2014\u2013\-][^\|\u2014\u2013\-]{2,60}$/, '').trim();
    return t;
  }

  function parseOgFromHtml(html, baseUrl) {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const og = p => doc.querySelector(`meta[property="${p}"]`)?.content?.trim() || '';
    const mt = n => doc.querySelector(`meta[name="${n}"]`)?.content?.trim() || '';
    const rawTitle = og('og:title') || mt('twitter:title') || doc.title || '';
    if (isBlockedPage(html, rawTitle)) throw new Error('blocked');
    const title = cleanTitle(rawTitle);

    // ── Image ─────────────────────────────────────────────────────────
    let image = og('og:image:secure_url') || og('product:image') || og('og:image') || mt('twitter:image') || '';
    if (image && !image.startsWith('http')) {
      try { image = new URL(image, baseUrl).href; } catch {}
    }
    // Fallback: <link rel="preload" as="image"> (common in Next.js/Nuxt apps)
    if (!image) {
      const preload = doc.querySelector('link[rel="preload"][as="image"][href]');
      if (preload) image = preload.getAttribute('href') || '';
    }
    // Fallback: lazy-loaded data-src images (pick first large one)
    if (!image) {
      for (const img of doc.querySelectorAll('img[data-src],img[data-lazy-src],img[data-original]')) {
        const src = img.getAttribute('data-src') || img.getAttribute('data-lazy-src') || img.getAttribute('data-original') || '';
        if (src.startsWith('http') && !/placeholder|spinner|blank|gif/i.test(src)) { image = src; break; }
      }
    }
    // Fallback: srcset — pick highest declared width
    if (!image) {
      for (const img of doc.querySelectorAll('img[srcset]')) {
        const best = (img.getAttribute('srcset') || '').split(',')
          .map(s => s.trim().split(/\s+/))
          .filter(p => p[0]?.startsWith('http'))
          .sort((a, b) => (parseInt(b[1]) || 0) - (parseInt(a[1]) || 0))[0];
        if (best?.[0]) { image = best[0]; break; }
      }
    }
    if (image && !image.startsWith('http')) {
      try { image = new URL(image, baseUrl).href; } catch {}
    }

    // ── Brand ─────────────────────────────────────────────────────────
    let brand = og('product:brand') || og('og:brand') || mt('twitter:data1') || '';
    // JSON-LD brand
    if (!brand) {
      for (const el of doc.querySelectorAll('script[type="application/ld+json"]')) {
        try {
          const digBrand = o => {
            if (!o || typeof o !== 'object') return '';
            if (typeof o.brand === 'string') return o.brand;
            if (o.brand?.name) return o.brand.name;
            if (o['@graph']) return digBrand(o['@graph']);
            if (Array.isArray(o)) { for (const x of o) { const r = digBrand(x); if (r) return r; } }
            return '';
          };
          brand = digBrand(JSON.parse(el.textContent));
          if (brand) break;
        } catch {}
      }
    }
    // __NEXT_DATA__ brand (SSENSE: designerName; Farfetch: brand.name)
    if (!brand) {
      const nd = html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/)?.[1];
      if (nd) {
        try {
          const findBrand = (o, d = 0) => {
            if (d > 10 || !o || typeof o !== 'object') return '';
            for (const k of ['designerName','brandName','brand','makerName','manufacturer']) {
              const v = o[k];
              if (typeof v === 'string' && v.length > 1 && v.length < 60) return v;
              if (v?.name && typeof v.name === 'string') return v.name;
            }
            for (const v of Object.values(o)) {
              if (v && typeof v === 'object' && !Array.isArray(v)) { const r = findBrand(v, d+1); if (r) return r; }
            }
            return '';
          };
          brand = findBrand(JSON.parse(nd));
        } catch {}
      }
    }

    // ── Price ─────────────────────────────────────────────────────────
    let price = og('product:price:amount') || og('og:price:amount') || '';

    // JSON-LD structured data
    if (!price) {
      for (const el of doc.querySelectorAll('script[type="application/ld+json"]')) {
        try {
          const dig = o => {
            if (!o || typeof o !== 'object') return '';
            if (o.price != null) return String(o.price);
            if (o.lowPrice != null) return String(o.lowPrice);
            if (o.offers)  return dig(o.offers);
            if (o['@graph']) return dig(o['@graph']);
            if (Array.isArray(o)) { for (const x of o) { const r = dig(x); if (r) return r; } }
            return '';
          };
          price = dig(JSON.parse(el.textContent));
          if (price) break;
        } catch {}
      }
    }

    // __NEXT_DATA__ (Next.js SSR — covers SSENSE, Farfetch, Matches, Browns, etc.)
    if (!price) {
      const nd = html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/)?.[1];
      if (nd) {
        try {
          const findPrice = (o, d = 0) => {
            if (d > 12 || !o || typeof o !== 'object') return '';
            for (const k of ['price','salePrice','currentPrice','priceValue','amount','retailPrice','formattedPrice','markdownPrice','basePrice','sellingPrice','discountedPrice']) {
              const v = o[k];
              if (v != null) {
                const s = String(v).replace(/[^0-9.]/g, '');
                if (/^\d+\.?\d*$/.test(s) && parseFloat(s) > 0) return s;
              }
            }
            for (const v of Object.values(o)) {
              if (v && typeof v === 'object' && !Array.isArray(v)) { const r = findPrice(v, d+1); if (r) return r; }
            }
            for (const v of Object.values(o)) {
              if (Array.isArray(v)) { for (const x of v) { const r = findPrice(x, d+1); if (r) return r; } }
            }
            return '';
          };
          price = findPrice(JSON.parse(nd));
        } catch {}
      }
    }

    // __NUXT__ / Nuxt SSR
    if (!price) {
      const nuxt = html.match(/window\.__NUXT__\s*=\s*(\{[\s\S]*?\});\s*<\/script>/)?.[1];
      if (nuxt) {
        try {
          const m = nuxt.match(/"price"\s*:\s*([\d.]+)/);
          if (m) price = m[1];
        } catch {}
      }
    }

    // Smallable: price stored in inline JSON as "price":{"EUR":{"amount":NNN}}
    if (!price && html.includes('smallable.com') || (!price && html.match(/"amount"\s*:\s*\d+/) && html.includes('smallable'))) {
      try {
        const m = html.match(/"amount"\s*:\s*(\d+(?:\.\d+)?)/);
        if (m) price = m[1];
      } catch {}
    }
    // Generic JSON price in page source (covers Smallable and similar)
    if (!price) {
      const m = html.match(/"(?:price|amount|salePrice|currentPrice)"\s*:\s*"?(\d+(?:\.\d{1,2})?)"?/);
      if (m && parseFloat(m[1]) > 0) price = m[1];
    }

    // DOM price selectors (fallback for non-SSR pages)
    if (!price) {
      const selectors = [
        '[itemprop="price"]','[data-price]','[class*="sale-price" i]',
        '[class*="current-price" i]','[class*="product-price" i]','[class*="price__amount" i]',
        '[class*="price" i]',
      ];
      for (const sel of selectors) {
        for (const el of doc.querySelectorAll(sel)) {
          const txt = (el.getAttribute('data-price') || el.getAttribute('content') || el.textContent || '').trim();
          const m = txt.match(/[\$\€\£\¥]\s*(\d[\d,]*\.?\d{0,2})/);
          if (m) { price = m[1].replace(/,/g, ''); break; }
        }
        if (price) break;
      }
    }

    if (!title && !image) throw new Error('empty');
    return { title, image, price: price.replace(/[^0-9.]/g, ''), brand: brand.trim() };
  }

  async function fetchUrl() {
    const urlEl = document.getElementById('url-field');
    const rawUrl = urlEl ? urlEl.value.trim() : s.addForm.url;
    if (!rawUrl) { urlEl?.focus(); return; }
    try { new URL(rawUrl); } catch { showToast('Enter a valid URL first.'); return; }
    const url = cleanUrl(rawUrl);

    s.addForm.url = url;
    s.addStep = 'fetching';
    render();

    // Analytics: log the domain (never the full URL)
    try {
      const domain = new URL(url).hostname.replace(/^www\./, '');
      if (typeof gtag === 'function') gtag('event', 'url_lookup', { domain });
    } catch {};

    const abort = new AbortController();
    const masterTimer = setTimeout(() => abort.abort(), 14000);

    try {
      // Microlink: renders JS, handles Cloudflare/SSENSE/etc.
      const mlPromise = fetch(
        `https://api.microlink.io/?url=${encodeURIComponent(url)}&palette=false&audio=false&video=false&iframe=false`,
        { signal: abort.signal }
      ).then(async r => {
        const ml = await r.json();
        if (ml.status !== 'success') throw new Error('ml-fail');
        const mlTitle = ml.data.title || '';
        if (isBlockedPage('', mlTitle)) throw new Error('blocked');
        return { source: 'ml', data: ml.data };
      });

      // HTML proxies run in parallel — first unblocked result wins
      const proxyFetch = (fetchPromise) => fetchPromise.then(res => {
        const parsed = parseOgFromHtml(res.html, url); // throws on blocked pages
        return { source: 'html', parsed };
      });

      const htmlProxies = [
        proxyFetch(
          fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, { signal: abort.signal })
            .then(r => r.json()).then(j => ({ html: j.contents || '' }))
        ),
        proxyFetch(
          fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`, { signal: abort.signal })
            .then(r => { if (!r.ok) throw new Error('http-' + r.status); return r.text(); })
            .then(h => ({ html: h }))
        ),
        proxyFetch(
          fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`, { signal: abort.signal })
            .then(r => { if (!r.ok) throw new Error('http-' + r.status); return r.text(); })
            .then(h => ({ html: h }))
        ),
        proxyFetch(
          fetch(`https://thingproxy.freeboard.io/fetch/${encodeURIComponent(url)}`, { signal: abort.signal })
            .then(r => r.text()).then(h => ({ html: h }))
        ),
      ];

      const result = await Promise.any([mlPromise, Promise.any(htmlProxies)]);
      clearTimeout(masterTimer);

      if (result.source === 'ml') {
        const ml = result.data;
        // Try to extract brand from URL — more reliable than parsing from Microlink title
        const urlMeta = parseUrlFallback(url);
        let cleanedTitle = cleanTitle(ml.title || '');
        let brand = urlMeta?.brand || '';
        // If brand found from URL, strip it from the front of the title to get clean product name
        if (brand) {
          const brandLower = brand.toLowerCase();
          const titleLower = cleanedTitle.toLowerCase();
          if (titleLower.startsWith(brandLower)) {
            cleanedTitle = cleanedTitle.slice(brand.length).replace(/^[\s,\-–—]+/, '').trim();
          }
        }
        // If Microlink title is empty or just a numeric product ID, use URL-derived name
        if (!cleanedTitle || /^\d+$/.test(cleanedTitle)) cleanedTitle = urlMeta?.name || cleanedTitle;
        s.addForm.name  = cleanedTitle;
        s.addForm.brand = brand || s.addForm.brand || '';
        s.addForm.img   = ml.image?.url || ml.screenshot?.url || urlMeta?.img || '';
        // Microlink sometimes returns price data directly
        const mlPrice = ml.price?.amount ?? ml.price ?? '';
        s.addForm.price = mlPrice ? String(mlPrice).replace(/[^0-9.]/g, '') : '';
        s.addStep = 'form';
        render();
        // Backfill price from ALL proxies in parallel — first one that returns a price wins
        (async () => {
          try {
            const enc = encodeURIComponent(url);
            const tryProxy = (promise) => promise.then(({ html }) => {
              const { price } = parseOgFromHtml(html, url);
              if (!price) throw new Error('no price');
              return price;
            });
            const price = await Promise.any([
              tryProxy(fetch(`https://api.allorigins.win/get?url=${enc}`).then(r => r.json()).then(j => ({ html: j.contents || '' }))),
              tryProxy(fetch(`https://corsproxy.io/?${enc}`).then(r => { if (!r.ok) throw new Error('err'); return r.text(); }).then(h => ({ html: h }))),
              tryProxy(fetch(`https://api.codetabs.com/v1/proxy?quest=${enc}`).then(r => { if (!r.ok) throw new Error('err'); return r.text(); }).then(h => ({ html: h }))),
              tryProxy(fetch(`https://thingproxy.freeboard.io/fetch/${enc}`).then(r => r.text()).then(h => ({ html: h }))),
            ]);
            if (price) {
              s.addForm.price = price;
              const el = document.getElementById('f-price');
              if (el) el.value = price;
            }
          } catch {}
        })();
      } else {
        const { parsed } = result;
        // Supplement with URL-based brand extraction if HTML parse didn't find one
        const urlMeta = parseUrlFallback(url);
        const brand = parsed.brand || urlMeta?.brand || '';
        let name = parsed.title;
        if (brand) {
          const brandLower = brand.toLowerCase();
          const nameLower = name.toLowerCase();
          if (nameLower.startsWith(brandLower)) {
            name = name.slice(brand.length).replace(/^[\s,\-–—]+/, '').trim();
          }
        }
        s.addForm.name  = name;
        s.addForm.brand = brand || s.addForm.brand || '';
        s.addForm.img   = parsed.image || urlMeta?.img || '';
        s.addForm.price = parsed.price;
        s.addStep = 'form';
        render();
      }
    } catch {
      clearTimeout(masterTimer);
      const fallback = parseUrlFallback(url);
      s.addForm.name  = fallback?.name  || '';
      s.addForm.brand = fallback?.brand || '';
      s.addForm.img   = fallback?.img   || '';
      s.addForm.price = '';
      s.addStep = 'form';
      render();
      showToast(fallback?.name
        ? 'Site blocked auto-fetch — check name and add image.'
        : "Couldn't fetch — fill in manually.");
    }
  }

  // ── Swipe-to-delete ─────────────────────────────────────────────────
  function swipeRowStart(e, itemId) {
    // Don't intercept taps on the drag handle
    if (e.target.closest('.list-drag-handle')) return;
    if (e.pointerType === 'mouse' && e.button !== 0) return;

    const wrap = e.currentTarget;
    const inner = wrap.querySelector('.list-row');
    const bg    = wrap.querySelector('.swipe-delete-bg');
    const startX = e.clientX;
    const startY = e.clientY;
    const THRESHOLD = 80;
    let decided = false, isSwipe = false, dx = 0;

    function onMove(ev) {
      const x = ev.clientX - startX;
      const y = ev.clientY - startY;
      if (!decided) {
        if (Math.abs(x) < 5 && Math.abs(y) < 5) return;
        if (Math.abs(y) >= Math.abs(x)) { cleanup(); return; } // vertical — let scroll handle it
        decided = true; isSwipe = true;
      }
      if (!isSwipe) return;
      ev.preventDefault();
      dx = Math.min(0, x);
      inner.style.transform = `translateX(${dx}px)`;
      bg.style.opacity = Math.min(1, Math.abs(dx) / THRESHOLD);
    }

    function onUp() {
      cleanup();
      if (!isSwipe || dx === 0) return;
      if (dx <= -THRESHOLD) {
        // Commit — animate row out then delete
        inner.style.transition = 'transform 0.2s ease-in';
        inner.style.transform = 'translateX(-110vw)';
        const h = wrap.offsetHeight;
        wrap.style.overflow = 'hidden';
        wrap.style.maxHeight = h + 'px';
        requestAnimationFrame(() => {
          wrap.style.transition = 'max-height 0.22s ease 0.12s, opacity 0.18s ease 0.12s';
          wrap.style.maxHeight = '0';
          wrap.style.opacity = '0';
        });
        setTimeout(() => removeItem(null, itemId), 350);
      } else {
        // Snap back
        inner.style.transition = 'transform 0.35s cubic-bezier(0.16,1,0.3,1)';
        inner.style.transform = '';
        bg.style.transition = 'opacity 0.25s ease';
        bg.style.opacity = '0';
        setTimeout(() => { inner.style.transition = ''; bg.style.transition = ''; }, 350);
      }
    }

    function cleanup() {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      document.removeEventListener('pointercancel', onUp);
    }

    document.addEventListener('pointermove', onMove, { passive: false });
    document.addEventListener('pointerup', onUp);
    document.addEventListener('pointercancel', onUp);
  }

  // ── Pointer-based list drag (smooth, animated) ──────────────────────
  let _listDrag = null; // active drag state

  function listDragStart(e, fromIdx) {
    // Only drag within wishlist detail list view
    if (s.screen !== 'wishlist-detail') return;
    e.preventDefault();
    e.stopPropagation();

    const rows = [...document.querySelectorAll('.list-view .list-row')];
    const srcRow = rows[fromIdx];
    if (!srcRow) return;

    const rect = srcRow.getBoundingClientRect();
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const offsetY = clientY - rect.top;

    // Build ghost clone
    const ghost = srcRow.cloneNode(true);
    ghost.className = 'drag-ghost';
    ghost.style.top = rect.top + 'px';
    ghost.style.height = rect.height + 'px';
    ghost.style.opacity = '0';
    document.body.appendChild(ghost);
    // Animate ghost in
    requestAnimationFrame(() => {
      ghost.style.transition = 'opacity 0.12s ease, top 0.14s cubic-bezier(0.16,1,0.3,1)';
      ghost.style.opacity = '1';
    });

    srcRow.classList.add('dragging');

    _listDrag = { fromIdx, curIdx: fromIdx, offsetY, ghost, rows, rowHeights: rows.map(r => r.getBoundingClientRect().height) };

    document.addEventListener('pointermove', _listDragMove, { passive: false });
    document.addEventListener('pointerup', _listDragEnd);
    document.addEventListener('pointercancel', _listDragEnd);
  }

  function _listDragMove(e) {
    if (!_listDrag) return;
    e.preventDefault();
    const { offsetY, ghost, rows, rowHeights, fromIdx } = _listDrag;
    const clientY = e.clientY;
    const ghostTop = clientY - offsetY;
    ghost.style.transition = 'opacity 0.12s ease';
    ghost.style.top = ghostTop + 'px';

    // Determine which row we're over
    let newIdx = fromIdx;
    for (let i = 0; i < rows.length; i++) {
      if (i === fromIdx) continue;
      const r = rows[i].getBoundingClientRect();
      const mid = r.top + r.height / 2;
      if (clientY < mid) { newIdx = i; break; }
      newIdx = i;
    }
    // Clamp
    newIdx = Math.max(0, Math.min(rows.length - 1, newIdx));

    // Update row indicators
    rows.forEach((r, i) => {
      r.classList.remove('drag-over-above', 'drag-over-below');
      if (i !== fromIdx && i === newIdx) {
        r.classList.add(newIdx < fromIdx ? 'drag-over-above' : 'drag-over-below');
      }
    });

    _listDrag.curIdx = newIdx;
  }

  function _listDragEnd(e) {
    if (!_listDrag) return;
    document.removeEventListener('pointermove', _listDragMove);
    document.removeEventListener('pointerup', _listDragEnd);
    document.removeEventListener('pointercancel', _listDragEnd);

    const { fromIdx, curIdx, ghost, rows } = _listDrag;
    _listDrag = null;

    // Animate ghost out
    ghost.style.transition = 'opacity 0.14s ease';
    ghost.style.opacity = '0';
    setTimeout(() => ghost.remove(), 150);

    rows.forEach(r => r.classList.remove('dragging', 'drag-over-above', 'drag-over-below'));

    if (fromIdx === curIdx) return;

    // Commit reorder
    const wid = s.currentWid;
    const wlList = wishlistItems(wid);
    const moved = wlList.splice(fromIdx, 1)[0];
    wlList.splice(curIdx, 0, moved);
    const base = Date.now();
    wlList.forEach((itm, i) => {
      items = items.map(x => x.id === itm.id ? { ...x, order: base - i * 1000 } : x);
    });
    saveData();
    render();
  }
